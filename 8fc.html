<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<title>CA Inter · Audit — Chapter 8 Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1EA; --card:#FFFFFF; --ink:#222A35; --muted:#6A7180;
    --navy:#1F3864; --navy2:#284a82; --accent:#2E75B6; --gold:#BF8F00;
    --green:#2F7D32; --green-bg:#E7F2E3; --red:#B23A2E; --red-bg:#FBE9E6;
    --soft:#EBF0F8; --line:#E4DFD4; --shadow:0 10px 30px rgba(31,56,100,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #fbfaf6 0%, rgba(251,250,246,0) 60%),
      repeating-linear-gradient(135deg, rgba(31,56,100,.020) 0 2px, transparent 2px 22px),
      var(--paper);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{width:100%;max-width:520px;padding:14px 16px 28px;display:flex;flex-direction:column;min-height:100dvh}

  /* Header */
  header{padding:6px 2px 12px}
  .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .ttl{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);font-size:25px;line-height:1.1;margin:3px 0 0;letter-spacing:-.01em}
  .ttl b{color:var(--gold);font-weight:600}
  .meta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .bar{flex:1;height:8px;border-radius:99px;background:#e6e2d8;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--navy));transition:width .35s ease}
  .count{font-weight:800;color:var(--navy);font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .score{font-weight:800;color:var(--green);font-size:13px;white-space:nowrap}

  /* Card */
  .stage{flex:1;display:flex;align-items:flex-start;padding-top:6px}
  .card{
    width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    border:1px solid #efece4;overflow:hidden;position:relative;animation:pop .32s cubic-bezier(.2,.7,.2,1)
  }
  .card:before{content:"";position:absolute;inset:0 0 auto;height:5px;background:linear-gradient(90deg,var(--navy),var(--accent) 60%,var(--gold))}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .card.swipe-l{animation:outL .22s ease forwards}
  .card.swipe-r{animation:outR .22s ease forwards}
  @keyframes outL{to{opacity:0;transform:translateX(-26px)}}
  @keyframes outR{to{opacity:0;transform:translateX(26px)}}
  .cbody{padding:18px 18px 20px}
  .pill{display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;
    color:#7a5c00;background:#FBF1D2;border:1px solid #efdfa6;padding:5px 10px;border-radius:99px}
  .qno{float:right;font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  .q{font-family:'Fraunces',serif;font-weight:500;font-size:19px;line-height:1.42;color:var(--navy);margin:14px 0 16px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fbfaf7;border:1.5px solid #e7e2d8;border-radius:13px;padding:12px 13px;font:inherit;color:var(--ink);
    font-size:14.5px;line-height:1.34;transition:border-color .15s,background .15s,transform .08s}
  .opt:active{transform:scale(.992)}
  .opt .lab{flex:none;width:24px;height:24px;border-radius:7px;background:var(--soft);color:var(--navy);
    font-weight:800;font-size:13px;display:grid;place-items:center;margin-top:-1px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .lab{background:var(--green);color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .lab{background:var(--red);color:#fff}
  .opt.dim{opacity:.62}
  .opt[disabled]{cursor:default}

  .exp{margin-top:15px;border-radius:13px;background:linear-gradient(180deg,#f6f9ff,#eef3fb);
    border:1px solid #d7e3f5;border-left:5px solid var(--accent);padding:13px 14px;
    max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease,margin .3s ease}
  .exp.show{max-height:420px;opacity:1}
  .exp .verdict{font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:5px}
  .exp .verdict.ok{color:var(--green)} .exp .verdict.no{color:var(--red)}
  .exp p{margin:0;font-size:14px;line-height:1.5;color:#33404f}
  .exp .ans{color:var(--navy);font-weight:700}

  /* Controls */
  .controls{margin-top:16px;display:flex;align-items:center;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px 12px;font:inherit;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .08s,filter .15s,opacity .15s}
  .btn:active{transform:translateY(1px)}
  .btn.prev{flex:none;width:54px;background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn.next{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(31,56,100,.25)}
  .btn.next:disabled{opacity:.45;box-shadow:none}
  .btn.reveal{background:#fff;border:1.5px solid var(--gold);color:#7a5c00;flex:none;width:auto;padding:14px 16px}
  .tools{margin-top:11px;display:flex;justify-content:center;gap:18px}
  .tool{background:none;border:none;font:inherit;font-weight:700;font-size:12.5px;color:var(--muted);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
  .tool:active{color:var(--navy)}
  .tool svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  .hint{text-align:center;color:#9a9384;font-size:11.5px;margin-top:14px;letter-spacing:.02em}

  /* Done screen */
  .done{width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid #efece4;
    padding:30px 22px;text-align:center;animation:pop .35s ease}
  .done .big{font-family:'Fraunces',serif;font-size:54px;font-weight:600;color:var(--navy);line-height:1}
  .done .big small{font-size:24px;color:var(--muted)}
  .done h2{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);margin:6px 0 2px;font-size:23px}
  .done p{color:var(--muted);font-size:14px;margin:4px 0 18px}
  .done .row{display:flex;gap:10px}
  .ring{width:118px;height:118px;margin:4px auto 8px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--gold) var(--deg,0deg), #ece7da 0deg)}
  .ring .inner{width:96px;height:96px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:inset 0 0 0 1px #efece4}
  .hidden{display:none!important}

  .hbar{ display:flex; align-items:center; gap:10px; }
  .htext{ flex:1; min-width:0; }
  .avatar{ width:42px; height:42px; border-radius:50%; flex:0 0 auto; object-fit:cover; border:2px solid #BF8F00; box-shadow:0 2px 6px rgba(0,0,0,.28); }
</style>

const DECK = [
 {c:"Forming an opinion — SA 700", q:"Forming an opinion and reporting on the financial statements is dealt with by:",
  o:["SA 700","SA 701","SA 705","SA 706"], a:0,
  e:"SA 700 (Revised) ‘Forming an Opinion and Reporting on Financial Statements’."},
 {c:"Unmodified opinion", q:"An unmodified (clean) opinion is expressed when the auditor concludes that the financial statements:",
  o:["Contain a material misstatement","Are prepared, in all material respects, in accordance with the applicable financial reporting framework","Cannot be audited","Are management’s responsibility only"], a:1,
  e:"An unmodified opinion is given when the FS are prepared, in all material respects, per the applicable framework (i.e., give a true & fair view)."},
 {c:"Report structure", q:"Which section appears first in the auditor’s report under SA 700 (Revised)?",
  o:["Basis for Opinion","Opinion","Key Audit Matters","Management’s Responsibilities"], a:1,
  e:"The ‘Opinion’ section is placed first, immediately followed by the ‘Basis for Opinion’ section."},
 {c:"Basis for Opinion", q:"The ‘Basis for Opinion’ section states that:",
  o:["The audit was free","The audit was conducted in accordance with the SAs and that the auditor is independent and has fulfilled ethical responsibilities","No evidence was obtained","Management prepared the report"], a:1,
  e:"It states the audit was conducted per the SAs, refers to the auditor’s responsibilities, and affirms independence and that sufficient appropriate evidence was obtained."},
 {c:"Key Audit Matters — SA 701", q:"Key Audit Matters are:",
  o:["Matters of most significance in the audit of the current period’s FS, selected from those communicated with TCWG","A separate opinion","Always a modification","Confidential to management"], a:0,
  e:"KAM are those matters that, in the auditor’s professional judgement, were of most significance — selected from matters communicated with TCWG. They are not a separate opinion."},
 {c:"KAM applicability", q:"Communication of Key Audit Matters in the auditor’s report is mandatory for:",
  o:["All companies","Audits of complete sets of general purpose financial statements of listed entities","Only private companies","Government companies only"], a:1,
  e:"SA 701 applies to audits of complete sets of general purpose FS of listed entities (and where the auditor otherwise decides/ is required to communicate KAM)."},
 {c:"Modified opinion — SA 705", q:"A modified opinion is required when:",
  o:["The FS are free from misstatement","The FS are materially misstated, or the auditor cannot obtain sufficient appropriate evidence","The audit is complete","Management requests it"], a:1,
  e:"SA 705 — a modified opinion arises from a material misstatement or an inability to obtain sufficient appropriate evidence (scope limitation)."},
 {c:"Qualified opinion", q:"A qualified opinion is expressed when misstatements (or the possible effects of undetected ones) are:",
  o:["Material but not pervasive","Material and pervasive","Immaterial","Non-existent"], a:0,
  e:"A qualified (‘except for’) opinion applies where the matter is material but NOT pervasive to the financial statements."},
 {c:"Adverse opinion", q:"An adverse opinion is expressed when misstatements are:",
  o:["Material but not pervasive","Both material and pervasive","Immaterial","A scope limitation"], a:1,
  e:"An adverse opinion is given when misstatements are both material and pervasive, so the FS as a whole are misleading."},
 {c:"Disclaimer of opinion", q:"A disclaimer of opinion is appropriate when the auditor:",
  o:["Disagrees on a small item","Is unable to obtain sufficient appropriate evidence and the possible effects are both material and pervasive","Finds a small error","Has a clean audit"], a:1,
  e:"A disclaimer is issued where the auditor cannot obtain sufficient evidence and the possible effects of undetected misstatements are material and pervasive."},
 {c:"Pervasive", q:"‘Pervasive’ describes effects on the financial statements that:",
  o:["Are confined to specific elements only","Are not confined to specific elements, or if confined represent a substantial proportion, or are fundamental to users’ understanding","Are always immaterial","Relate only to disclosures"], a:1,
  e:"Pervasive effects are not confined to specific elements/accounts; or if confined, represent a substantial proportion; or, for disclosures, are fundamental to users’ understanding."},
 {c:"Emphasis of Matter — SA 706", q:"An Emphasis of Matter paragraph refers to a matter that is:",
  o:["Misstated in the FS","Appropriately presented/disclosed in the FS and, in the auditor’s judgement, fundamental to users’ understanding","Not disclosed anywhere","A modification of the opinion"], a:1,
  e:"An EOM highlights a matter appropriately disclosed in the FS that is fundamental to users’ understanding; it does NOT modify the opinion."},
 {c:"Other Matter paragraph", q:"An Other Matter paragraph refers to a matter:",
  o:["Disclosed in the FS","Not presented or disclosed in the FS but relevant to users’ understanding of the audit, the auditor’s responsibilities or the report","That misstates the FS","That qualifies the opinion"], a:1,
  e:"An Other Matter paragraph communicates a matter not presented in the FS but relevant to understanding the audit, the auditor’s responsibilities, or the report."},
 {c:"Going concern in report — SA 570", q:"When a material uncertainty on going concern is adequately disclosed, the report includes:",
  o:["A qualified opinion","A separate section headed ‘Material Uncertainty Related to Going Concern’ with an unmodified opinion","An adverse opinion","No mention"], a:1,
  e:"With adequate disclosure, the opinion is unmodified and a separate ‘Material Uncertainty Related to Going Concern’ section is added."},
 {c:"Comparatives — SA 710", q:"Where corresponding figures are presented, the auditor’s opinion:",
  o:["Refers to each period","Does not refer to the corresponding figures except in specified circumstances","Ignores prior figures","Is always modified"], a:1,
  e:"For corresponding figures, the opinion ordinarily does not refer to them, except where the prior modification is unresolved or a prior misstatement exists."},
 {c:"Management responsibilities", q:"The ‘Responsibilities of Management for the FS’ section explains management’s responsibility for:",

  e:"It describes management’s responsibility for preparing the FS per the framework, for necessary internal control, and for assessing going concern."},

 {c:"CARO applicability", q:"CARO 2020 does NOT apply to:",

  e:"CARO 2020 excludes banking, insurance and Section 8 companies, OPCs, small companies, and certain private companies meeting all the exemption thresholds."},
 {c:"Fraud reporting — Sec 143(12)", q:"If the auditor suspects an offence of fraud involving ₹1 crore or more by officers/employees, the auditor must report to:",
  o:["The shareholders","The Central Government (in the prescribed manner)","The Registrar only","No one"], a:1,
  e:"Fraud of ₹1 crore or more is reported to the Central Government; below ₹1 crore, it is reported to the Audit Committee/Board and disclosed in the Board’s Report."},
 {c:"Signing the report — Sec 145", q:"The auditor’s report of a company is to be signed:",
  o:["By any director","Only by the person appointed as auditor (or a partner of the firm so authorised, being a CA in practice)","By the company secretary","By the CFO"], a:1,
  e:"Section 145 — the auditor’s report is signed only by the auditor (or by a partner of the audit firm authorised to do so), being a chartered accountant."},
 {c:"True & fair", q:"The auditor’s opinion that the financial statements give a ‘true and fair view’ means the auditor:",
  o:["Guarantees accuracy","Provides reasonable assurance that the FS are free from material misstatement and fairly presented","Certifies the FS","Prepares the FS"], a:1,
  e:"A true & fair opinion conveys reasonable assurance of freedom from material misstatement and fair presentation — it is an opinion, not a guarantee or certificate."},
 {c:"Date of the report", q:"The auditor’s report shall be dated no earlier than the date on which the auditor has:",
  o:["Started the audit","Obtained sufficient appropriate evidence, including that the FS have been approved by those with authority","Issued the engagement letter","Received the fee"], a:1,
  e:"The report is dated no earlier than the date the auditor obtained sufficient appropriate evidence, including evidence that the FS were approved by those with recognised authority."},
 {c:"Other information — SA 720", q:"The auditor’s responsibilities relating to other information (e.g., the Board’s report) in documents containing audited FS are in:",
  o:["SA 700","SA 706","SA 720","SA 710"], a:2,
  e:"SA 720 ‘The Auditor’s Responsibilities Relating to Other Information’ requires the auditor to read other information and consider material inconsistencies."},
 {c:"Branch audit — Sec 143(8)", q:"Where a company’s branch is audited by a branch auditor, the branch auditor’s report is:",
  o:["Ignored","Sent to the company’s auditor, who deals with it in preparing the report as he considers necessary","Filed with the Registrar separately only","The final report"], a:1,
  e:"Under Section 143(8), the branch auditor reports to the company’s (statutory) auditor, who deals with the branch report in framing the main audit report."},
];

let order = DECK.map((_,i)=>i);
let pos = 0;
const answered = new Array(DECK.length).fill(null); // stores chosen index (per deck index)
const stage = document.getElementById('stage');
const navwrap = document.getElementById('navwrap');
const elProg = document.getElementById('prog');
const elCount = document.getElementById('count');
const elScore = document.getElementById('score');
const btnPrev = document.getElementById('prev');
const btnNext = document.getElementById('next');
const btnReveal = document.getElementById('reveal');
const LAB=['A','B','C','D'];

function scored(){return answered.filter((v,i)=>v!==null && v==='reveal'?false:(v!==null && v===DECK[i].a)).length;}
function correctCount(){let n=0;answered.forEach((v,i)=>{if(typeof v==='number' && v===DECK[i].a)n++});return n;}
function attempted(){return answered.filter(v=>typeof v==='number').length;}

function render(anim){
  if(pos>=order.length){return finish();}
  const di = order[pos];
  const card = DECK[di];
  const chosen = answered[di]; // number | 'reveal' | null
  const locked = chosen!==null;
  elProg.style.width = ((pos)/order.length*100)+'%';
  elCount.textContent = (pos+1)+' / '+order.length;
  elScore.textContent = '✓ '+correctCount();

  const opts = card.o.map((txt,i)=>{
    let cls='opt';
    if(locked){
      if(i===card.a) cls+=' correct';
      else if(typeof chosen==='number' && i===chosen) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" data-i="${i}" ${locked?'disabled':''}>
        <span class="lab">${LAB[i]}</span><span>${txt}</span></button>`;
  }).join('');

  let expCls = locked?'exp show':'exp';
  let verdict='';
  if(locked){
    if(chosen==='reveal') verdict=`<div class="verdict ok">Answer</div>`;
    else if(chosen===card.a) verdict=`<div class="verdict ok">✓ Correct</div>`;
    else verdict=`<div class="verdict no">✗ Not quite</div>`;
  }
  const expHtml = `<div class="${expCls}">${verdict}<p><span class="ans">Answer: ${LAB[card.a]}.</span> ${card.e}</p></div>`;

  stage.innerHTML = `<div class="card${anim?'':''}" id="card">
      <div class="cbody">
        <span class="pill">${card.c}</span><span class="qno">Q ${pos+1}</span>
        <div class="q">${card.q}</div>
        <div class="opts">${opts}</div>
        ${expHtml}
      </div></div>`;

  stage.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',()=>choose(parseInt(b.dataset.i,10)));
  });
  btnPrev.disabled = pos===0;
  btnNext.disabled = !locked;
  btnNext.textContent = (pos===order.length-1)?'Finish':'Next ›';
  btnReveal.style.visibility = locked?'hidden':'visible';
}

function choose(i){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]=i;
  render();
}
function reveal(){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]='reveal';
  render();
}
function go(d,dir){
  const card=document.getElementById('card');
  if(card && dir){ card.classList.add(dir==='next'?'swipe-l':'swipe-r'); }
  setTimeout(()=>{ pos=Math.max(0,Math.min(order.length,pos+d)); render(true); window.scrollTo({top:0,behavior:'smooth'}); }, dir?170:0);
}
function finish(){
  elProg.style.width='100%'; elCount.textContent=order.length+' / '+order.length;
  const att=attempted(), cor=correctCount();
  const pct = att? Math.round(cor/att*100):0;
  elScore.textContent='✓ '+cor;
  navwrap.classList.add('hidden');
  stage.innerHTML = `<div class="done">
    <div class="ring" style="--deg:${pct*3.6}deg"><div class="inner"><div><div class="big">${pct}<small>%</small></div></div></div></div>
    <h2>Deck complete</h2>
    <p>${cor} correct out of ${att} attempted · ${DECK.length} cards</p>
    <div class="row">
      <button class="btn next" id="again">Restart</button>
      <button class="btn reveal" id="shuf2" style="width:auto">Shuffle &amp; retry</button>
    </div>
  </div>`;
  document.getElementById('again').onclick=()=>{restart(false);};
  document.getElementById('shuf2').onclick=()=>{restart(true);};
}
function restart(shuf){
  for(let i=0;i<answered.length;i++) answered[i]=null;
  order = DECK.map((_,i)=>i);
  if(shuf){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} }
  pos=0; navwrap.classList.remove('hidden'); render(true); window.scrollTo({top:0});
}

btnPrev.onclick=()=>go(-1,'prev');
btnNext.onclick=()=>go(1,'next');
btnReveal.onclick=reveal;
document.getElementById('shuffle').onclick=()=>restart(true);
document.getElementById('restart').onclick=()=>restart(false);

// swipe
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0 && !btnNext.disabled) go(1,'next');
    else if(dx>0 && pos>0) go(-1,'prev');
  }
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && !btnNext.disabled) go(1,'next');
  if(e.key==='ArrowLeft' && pos>0) go(-1,'prev');
  if(['1','2','3','4'].includes(e.key)) choose(parseInt(e.key,10)-1);
  if(e.key.toLowerCase()==='r') reveal();
});

render(true);
</script>
</body>
</html>
