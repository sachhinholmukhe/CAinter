<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<title>CA Inter · Audit — Chapter 1 Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1EA; --card:#FFFFFF; --ink:#222A35; --muted:#6A7180;
    --navy:#1F3864; --navy2:#284a82; --accent:#2E75B6; --gold:#BF8F00;
    --green:#2F7D32; --green-bg:#E7F2E3; --red:#B23A2E; --red-bg:#FBE9E6;
    --soft:#EBF0F8; --line:#E4DFD4; --shadow:0 10px 30px rgba(31,56,100,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #fbfaf6 0%, rgba(251,250,246,0) 60%),
      repeating-linear-gradient(135deg, rgba(31,56,100,.020) 0 2px, transparent 2px 22px),
      var(--paper);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{width:100%;max-width:520px;padding:14px 16px 28px;display:flex;flex-direction:column;min-height:100dvh}

  /* Header */
  header{padding:6px 2px 12px}
  .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .ttl{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);font-size:25px;line-height:1.1;margin:3px 0 0;letter-spacing:-.01em}
  .ttl b{color:var(--gold);font-weight:600}
  .meta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .bar{flex:1;height:8px;border-radius:99px;background:#e6e2d8;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--navy));transition:width .35s ease}
  .count{font-weight:800;color:var(--navy);font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .score{font-weight:800;color:var(--green);font-size:13px;white-space:nowrap}

  /* Card */
  .stage{flex:1;display:flex;align-items:flex-start;padding-top:6px}
  .card{
    width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    border:1px solid #efece4;overflow:hidden;position:relative;animation:pop .32s cubic-bezier(.2,.7,.2,1)
  }
  .card:before{content:"";position:absolute;inset:0 0 auto;height:5px;background:linear-gradient(90deg,var(--navy),var(--accent) 60%,var(--gold))}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .card.swipe-l{animation:outL .22s ease forwards}
  .card.swipe-r{animation:outR .22s ease forwards}
  @keyframes outL{to{opacity:0;transform:translateX(-26px)}}
  @keyframes outR{to{opacity:0;transform:translateX(26px)}}
  .cbody{padding:18px 18px 20px}
  .pill{display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;
    color:#7a5c00;background:#FBF1D2;border:1px solid #efdfa6;padding:5px 10px;border-radius:99px}
  .qno{float:right;font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  .q{font-family:'Fraunces',serif;font-weight:500;font-size:19px;line-height:1.42;color:var(--navy);margin:14px 0 16px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fbfaf7;border:1.5px solid #e7e2d8;border-radius:13px;padding:12px 13px;font:inherit;color:var(--ink);
    font-size:14.5px;line-height:1.34;transition:border-color .15s,background .15s,transform .08s}
  .opt:active{transform:scale(.992)}
  .opt .lab{flex:none;width:24px;height:24px;border-radius:7px;background:var(--soft);color:var(--navy);
    font-weight:800;font-size:13px;display:grid;place-items:center;margin-top:-1px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .lab{background:var(--green);color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .lab{background:var(--red);color:#fff}
  .opt.dim{opacity:.62}
  .opt[disabled]{cursor:default}

  .exp{margin-top:15px;border-radius:13px;background:linear-gradient(180deg,#f6f9ff,#eef3fb);
    border:1px solid #d7e3f5;border-left:5px solid var(--accent);padding:13px 14px;
    max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease,margin .3s ease}
  .exp.show{max-height:420px;opacity:1}
  .exp .verdict{font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:5px}
  .exp .verdict.ok{color:var(--green)} .exp .verdict.no{color:var(--red)}
  .exp p{margin:0;font-size:14px;line-height:1.5;color:#33404f}
  .exp .ans{color:var(--navy);font-weight:700}

  /* Controls */
  .controls{margin-top:16px;display:flex;align-items:center;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px 12px;font:inherit;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .08s,filter .15s,opacity .15s}
  .btn:active{transform:translateY(1px)}
  .btn.prev{flex:none;width:54px;background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn.next{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(31,56,100,.25)}
  .btn.next:disabled{opacity:.45;box-shadow:none}
  .btn.reveal{background:#fff;border:1.5px solid var(--gold);color:#7a5c00;flex:none;width:auto;padding:14px 16px}
  .tools{margin-top:11px;display:flex;justify-content:center;gap:18px}
  .tool{background:none;border:none;font:inherit;font-weight:700;font-size:12.5px;color:var(--muted);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
  .tool:active{color:var(--navy)}
  .tool svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  .hint{text-align:center;color:#9a9384;font-size:11.5px;margin-top:14px;letter-spacing:.02em}

  /* Done screen */
  .done{width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid #efece4;
    padding:30px 22px;text-align:center;animation:pop .35s ease}
  .done .big{font-family:'Fraunces',serif;font-size:54px;font-weight:600;color:var(--navy);line-height:1}
  .done .big small{font-size:24px;color:var(--muted)}
  .done h2{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);margin:6px 0 2px;font-size:23px}
  .done p{color:var(--muted);font-size:14px;margin:4px 0 18px}
  .done .row{display:flex;gap:10px}
  .ring{width:118px;height:118px;margin:4px auto 8px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--gold) var(--deg,0deg), #ece7da 0deg)}
  .ring .inner{width:96px;height:96px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:inset 0 0 0 1px #efece4}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kick">CA Intermediate · Auditing &amp; Ethics</div>
    <div class="ttl">Chapter 1 — <b>Flashcards</b><br>Nature, Objective &amp; Scope of Audit</div>
    <div class="meta">
      <div class="bar"><i id="prog"></i></div>
      <div class="count" id="count">1 / 1</div>
      <div class="score" id="score">✓ 0</div>
    </div>
  </header>

  <div class="stage" id="stage"><!-- card injected --></div>

  <div id="navwrap">
    <div class="controls">
      <button class="btn prev" id="prev" aria-label="Previous">‹</button>
      <button class="btn reveal" id="reveal">Reveal</button>
      <button class="btn next" id="next" disabled>Next ›</button>
    </div>
    <div class="tools">
      <button class="tool" id="shuffle"><svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>Shuffle</button>
      <button class="tool" id="restart"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>Restart</button>
    </div>
    <div class="hint">Tap an option to check · swipe left/right to move</div>
  </div>
</div>

<script>
const DECK = [
 {c:"Meaning of audit", q:"The word ‘audit’ is derived from the Latin word ‘audire’. What does it mean?",
  o:["To verify","To hear","To examine","To certify"], a:1,
  e:"‘Audire’ means ‘to hear’. Historically, accounts were read out and ‘heard’ by the auditor — the term reflects audit’s origin."},
 {c:"Objective (SA 200)", q:"As per SA 200, the purpose of an audit is to enhance users’ confidence in the financial statements. This is achieved by:",
  o:["The auditor preparing the financial statements","The auditor guaranteeing their accuracy","Expressing an opinion on whether the FS are prepared, in all material respects, per the applicable framework","Certifying that no fraud exists"], a:2,
  e:"The auditor expresses an opinion on whether the FS are prepared, in all material respects, in accordance with the applicable financial reporting framework — not a guarantee or certificate."},
 {c:"Reasonable assurance", q:"An audit conducted in accordance with the SAs is designed to obtain:",
  o:["Absolute assurance","Reasonable assurance","Limited assurance","No assurance"], a:1,
  e:"An audit provides reasonable assurance — a high, but not absolute, level of assurance — because of the inherent limitations of an audit."},
 {c:"Why not absolute", q:"An audit cannot provide absolute assurance mainly because:",
  o:["Auditors are not competent enough","Of the inherent limitations of an audit","The law does not permit it","Management never cooperates"], a:1,
  e:"Inherent limitations — judgement in financial reporting, sampling, persuasive evidence and future events — mean only reasonable assurance is achievable."},
 {c:"Nature of evidence", q:"Which statement about audit evidence is correct?",
  o:["All audit evidence is conclusive","Most audit evidence is persuasive rather than conclusive","Audit evidence is never reliable","Evidence must cover 100% of transactions"], a:1,
  e:"Because of the nature of audit procedures, most evidence is persuasive rather than conclusive — a key contributor to the inherent limitations."},
 {c:"Inherent limitations", q:"Which of the following is NOT a source of the inherent limitations of an audit?",
  o:["The nature of financial reporting (judgements & estimates)","The nature of audit procedures (sampling, reliance on management)","The auditor lacking professional qualification","Timeliness of reporting and the balance between cost and benefit"], a:2,
  e:"Inherent limitations arise from the nature of financial reporting, the nature of audit procedures, and timeliness/cost — not from the auditor lacking qualifications."},
 {c:"Future events", q:"A company that was a going concern on the report date collapses a year later due to new technology. Which inherent limitation does this illustrate?",
  o:["Sampling risk","Future events","Management fraud","Non-compliance with AS"], a:1,
  e:"Future events or conditions may cause an entity to cease to continue; their later occurrence does not, by itself, indicate any failure by the auditor."},
 {c:"Internal control limits", q:"Even a well-designed internal control system has inherent limitations because:",
  o:["Controls are never documented","Of management override and the possibility of collusion","Auditors do not test controls","Controls are illegal"], a:1,
  e:"Internal control can be defeated by management override or by collusion among people — adding to the audit’s inherent limitations."},
 {c:"Management’s responsibility", q:"Responsibility for preparing financial statements that give a true and fair view rests with:",
  o:["The statutory auditor","Management and those charged with governance","The internal auditor","The Central Government"], a:1,
  e:"Management (with those charged with governance) is responsible for preparing the FS and for internal control; the auditor’s job is to express an opinion."},
 {c:"True & fair", q:"To form an opinion on ‘true and fair’, which would the auditor NOT specifically consider?",
  o:["Assets are neither over- nor under-valued","Accounting policies are consistently applied","Material items are properly disclosed","The company will earn profits next year"], a:3,
  e:"‘True & fair’ concerns proper valuation, consistency and disclosure — it is not a forecast of future profitability."},
 {c:"Scope of audit", q:"The scope of an audit of financial statements is determined by:",
  o:["The auditor alone, at his discretion","The engagement terms, the requirements of relevant law, and the pronouncements of ICAI","The management of the entity","The shareholders at the general meeting"], a:1,
  e:"Scope is governed by the terms of engagement, applicable statutes/regulations and the Standards/pronouncements of ICAI."},
 {c:"Aspects covered", q:"Which of the following is NOT an aspect to be covered in an audit?",
  o:["Examining the accounting & internal control systems","Verifying the existence & value of assets and liabilities","Preparing the entity’s books of account","Checking compliance with statutory requirements"], a:2,
  e:"The auditor does not prepare the books — that would impair independence. He examines controls, verifies items, checks compliance and reports."},
 {c:"Errors — commission", q:"Recording a purchase of ₹5,000 as ₹500 in the purchase book is an example of:",
  o:["Error of omission","Error of principle","Error of commission","Compensating error"], a:2,
  e:"An error of commission arises from incorrect recording, posting, casting or totalling — here, a wrong amount has been recorded."},
 {c:"Errors — principle", q:"Treating a capital expenditure as a revenue expenditure is an:",
  o:["Error of commission","Error of principle","Error of omission","Compensating error"], a:1,
  e:"An error of principle arises when an entry violates accounting principles — e.g., misclassifying capital vs revenue items."},
 {c:"Errors — compensating", q:"An error that is counter-balanced by another error so the trial balance still agrees is a:",
  o:["Compensating error","Error of omission","Error of duplication","Error of principle"], a:0,
  e:"Compensating errors offset each other in amount, so the trial balance is not disturbed and the errors are harder to detect."},
 {c:"Fraud — types", q:"Theft of an entity’s assets, often by employees, is termed:",
  o:["Fraudulent financial reporting","Misappropriation of assets","Error of commission","Window dressing"], a:1,
  e:"Misappropriation of assets (e.g., embezzlement) is one type of fraud; the other is fraudulent financial reporting (intentional misstatement of the FS)."},
 {c:"Fraud — responsibility", q:"Primary responsibility for the prevention and detection of fraud rests with:",
  o:["The statutory auditor","Those charged with governance and management","The internal auditor only","The Comptroller & Auditor General"], a:1,
  e:"Per SA 240, prevention/detection of fraud is primarily the responsibility of TCWG and management; the auditor only obtains reasonable assurance."},
 {c:"Materiality (SA 320)", q:"Misstatements are material if, individually or in aggregate, they could reasonably be expected to:",
  o:["Be detected by sampling","Influence the economic decisions of users taken on the basis of the FS","Require restatement of prior periods","Attract a penalty under the Companies Act"], a:1,
  e:"Materiality is judged by whether a misstatement could influence users’ economic decisions; it depends on both the size and the nature of the item."},
 {c:"Audit & accounting", q:"“Auditing begins where accounting ends.” This means that:",
  o:["Auditing and accounting are unrelated","The auditor reviews and reports on financial information after the accounting process","Auditors must prepare the accounts first","Accounting is more important than auditing"], a:1,
  e:"Once accounting produces the financial statements, auditing examines and reports on them — hence audit begins where accounting ends."},
 {c:"Related disciplines", q:"Appreciating the effect of price-level changes and economic conditions on an entity links auditing most closely with:",
  o:["Law","Economics","Behavioural science","Statistics"], a:1,
  e:"Auditing is closely related to economics — the auditor must understand the entity’s economic environment to assess its affairs."},
 {c:"Related disciplines", q:"In making enquiries and dealing with client staff, the auditor draws on principles of:",
  o:["Mathematics","Behavioural science","Production","Law"], a:1,
  e:"Auditing is linked to behavioural science because the auditor constantly interacts with people and must understand human behaviour."},
 {c:"Standards framework", q:"Standards on Quality Control (SQC 1) apply to:",
  o:["Only listed companies","All firms, for audits, reviews, other assurance and related-services engagements","Only statutory audits","Only government audits"], a:1,
  e:"SQC 1 applies to all firms in respect of audits and reviews of historical financial information, and other assurance and related-services engagements."},
 {c:"Engagement standards", q:"Standards on Auditing (SAs) apply to:",
  o:["Reviews of historical financial information","Audits of historical financial information","Compilation engagements","Agreed-upon procedures"], a:1,
  e:"SAs apply to audits of historical financial information; SREs to reviews, SAEs to other assurance engagements, and SRSs to related services."},
 {c:"Assurance levels", q:"A ‘review’ engagement provides:",
  o:["Absolute assurance","Reasonable assurance","Limited assurance","No assurance"], a:2,
  e:"A review is a limited assurance engagement, expressed in a negative form (‘nothing has come to our attention’), whereas an audit gives reasonable assurance."},
 {c:"Related services", q:"Which engagement does NOT provide any assurance?",
  o:["Audit","Review","Agreed-upon procedures","Examination giving a conclusion on subject matter"], a:2,
  e:"Agreed-upon procedures and compilation engagements are ‘related services’ — they provide no assurance; the user draws their own conclusions."},
 {c:"Assurance elements", q:"Which of the following is an element of an assurance engagement?",
  o:["A two-party relationship","A three-party relationship (practitioner, responsible party, intended users)","Absence of any criteria","An oral report only"], a:1,
  e:"An assurance engagement has five elements: a three-party relationship, an underlying subject matter, suitable criteria, sufficient appropriate evidence, and a written assurance report."},
 {c:"Professional skepticism", q:"An attitude that includes a questioning mind and alertness to conditions indicating possible misstatement is called:",
  o:["Professional judgement","Professional skepticism","Due diligence","Reasonable assurance"], a:1,
  e:"SA 200 defines professional skepticism — a questioning mind and a critical assessment of audit evidence throughout the audit."},
 {c:"Professional judgement", q:"Deciding the nature, timing and extent of audit procedures requires the auditor to exercise:",
  o:["Professional skepticism only","Professional judgement","Absolute assurance","Management’s discretion"], a:1,
  e:"Professional judgement — applying relevant training, knowledge and experience — is essential for the key decisions in an audit (SA 200)."},
 {c:"Audit vs investigation", q:"Which statement distinguishing audit from investigation is correct?",
  o:["An audit is for a special purpose; an investigation is general","An investigation has a specific objective and may go beyond the books of account","An investigation always gives absolute assurance","Audit and investigation are identical"], a:1,
  e:"An investigation is a critical examination with a special objective (e.g., suspected fraud, a proposed acquisition), usually more intensive and often beyond the books — unlike a routine audit."},
 {c:"Statutory audit", q:"An audit required and governed by the provisions of a statute is a:",
  o:["Voluntary audit","Statutory audit","Internal audit","Management audit"], a:1,
  e:"A statutory audit is mandated by law (e.g., the Companies Act); its scope cannot be curtailed by any agreement between the parties."},
 {c:"Internal vs statutory", q:"Which is true of the internal auditor compared with the statutory auditor?",
  o:["The internal auditor is appointed by the shareholders","The internal auditor reports to management/TCWG, while the statutory auditor reports to the shareholders","The internal auditor expresses a true & fair opinion to members","The internal auditor’s scope is fixed by statute"], a:1,
  e:"The internal auditor is appointed by, and reports to, management/TCWG; the statutory auditor is appointed by, and reports to, the shareholders."},
 {c:"Principles of audit", q:"The basic principle requiring the auditor to be straightforward, honest and unbiased is:",
  o:["Confidentiality","Integrity, objectivity & independence","Documentation","Skills & competence"], a:1,
  e:"Integrity, objectivity and independence is a fundamental principle governing an audit — the auditor must be honest, fair and free from bias."},
];

let order = DECK.map((_,i)=>i);
let pos = 0;
const answered = new Array(DECK.length).fill(null); // stores chosen index (per deck index)
const stage = document.getElementById('stage');
const navwrap = document.getElementById('navwrap');
const elProg = document.getElementById('prog');
const elCount = document.getElementById('count');
const elScore = document.getElementById('score');
const btnPrev = document.getElementById('prev');
const btnNext = document.getElementById('next');
const btnReveal = document.getElementById('reveal');
const LAB=['A','B','C','D'];

function scored(){return answered.filter((v,i)=>v!==null && v==='reveal'?false:(v!==null && v===DECK[i].a)).length;}
function correctCount(){let n=0;answered.forEach((v,i)=>{if(typeof v==='number' && v===DECK[i].a)n++});return n;}
function attempted(){return answered.filter(v=>typeof v==='number').length;}

function render(anim){
  if(pos>=order.length){return finish();}
  const di = order[pos];
  const card = DECK[di];
  const chosen = answered[di]; // number | 'reveal' | null
  const locked = chosen!==null;
  elProg.style.width = ((pos)/order.length*100)+'%';
  elCount.textContent = (pos+1)+' / '+order.length;
  elScore.textContent = '✓ '+correctCount();

  const opts = card.o.map((txt,i)=>{
    let cls='opt';
    if(locked){
      if(i===card.a) cls+=' correct';
      else if(typeof chosen==='number' && i===chosen) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" data-i="${i}" ${locked?'disabled':''}>
        <span class="lab">${LAB[i]}</span><span>${txt}</span></button>`;
  }).join('');

  let expCls = locked?'exp show':'exp';
  let verdict='';
  if(locked){
    if(chosen==='reveal') verdict=`<div class="verdict ok">Answer</div>`;
    else if(chosen===card.a) verdict=`<div class="verdict ok">✓ Correct</div>`;
    else verdict=`<div class="verdict no">✗ Not quite</div>`;
  }
  const expHtml = `<div class="${expCls}">${verdict}<p><span class="ans">Answer: ${LAB[card.a]}.</span> ${card.e}</p></div>`;

  stage.innerHTML = `<div class="card${anim?'':''}" id="card">
      <div class="cbody">
        <span class="pill">${card.c}</span><span class="qno">Q ${pos+1}</span>
        <div class="q">${card.q}</div>
        <div class="opts">${opts}</div>
        ${expHtml}
      </div></div>`;

  stage.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',()=>choose(parseInt(b.dataset.i,10)));
  });
  btnPrev.disabled = pos===0;
  btnNext.disabled = !locked;
  btnNext.textContent = (pos===order.length-1)?'Finish':'Next ›';
  btnReveal.style.visibility = locked?'hidden':'visible';
}

function choose(i){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]=i;
  render();
}
function reveal(){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]='reveal';
  render();
}
function go(d,dir){
  const card=document.getElementById('card');
  if(card && dir){ card.classList.add(dir==='next'?'swipe-l':'swipe-r'); }
  setTimeout(()=>{ pos=Math.max(0,Math.min(order.length,pos+d)); render(true); window.scrollTo({top:0,behavior:'smooth'}); }, dir?170:0);
}
function finish(){
  elProg.style.width='100%'; elCount.textContent=order.length+' / '+order.length;
  const att=attempted(), cor=correctCount();
  const pct = att? Math.round(cor/att*100):0;
  elScore.textContent='✓ '+cor;
  navwrap.classList.add('hidden');
  stage.innerHTML = `<div class="done">
    <div class="ring" style="--deg:${pct*3.6}deg"><div class="inner"><div><div class="big">${pct}<small>%</small></div></div></div></div>
    <h2>Deck complete</h2>
    <p>${cor} correct out of ${att} attempted · ${DECK.length} cards</p>
    <div class="row">
      <button class="btn next" id="again">Restart</button>
      <button class="btn reveal" id="shuf2" style="width:auto">Shuffle &amp; retry</button>
    </div>
  </div>`;
  document.getElementById('again').onclick=()=>{restart(false);};
  document.getElementById('shuf2').onclick=()=>{restart(true);};
}
function restart(shuf){
  for(let i=0;i<answered.length;i++) answered[i]=null;
  order = DECK.map((_,i)=>i);
  if(shuf){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} }
  pos=0; navwrap.classList.remove('hidden'); render(true); window.scrollTo({top:0});
}

btnPrev.onclick=()=>go(-1,'prev');
btnNext.onclick=()=>go(1,'next');
btnReveal.onclick=reveal;
document.getElementById('shuffle').onclick=()=>restart(true);
document.getElementById('restart').onclick=()=>restart(false);

// swipe
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0 && !btnNext.disabled) go(1,'next');
    else if(dx>0 && pos>0) go(-1,'prev');
  }
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && !btnNext.disabled) go(1,'next');
  if(e.key==='ArrowLeft' && pos>0) go(-1,'prev');
  if(['1','2','3','4'].includes(e.key)) choose(parseInt(e.key,10)-1);
  if(e.key.toLowerCase()==='r') reveal();
});

render(true);
</script>
</body>
</html>
