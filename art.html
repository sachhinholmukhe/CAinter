<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1F3864"/>
<title>Revision Tracker — CA Inter Auditing &amp; Ethics</title>
<style>
  :root{ --navy:#1F3864; --blue:#2E5496; --accent:#2E75B6; --green:#548235; --gold:#BF8F00; --amber:#C55A11;
         --ink:#13233b; --muted:#6a7a90; --line:#e4eaf2; --bg:#eef2f7; --card:#fff; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%; padding-bottom:40px; }
  header{ position:sticky; top:0; z-index:30; background:linear-gradient(135deg,var(--navy),var(--accent)); color:#fff; padding:12px 14px 10px; box-shadow:0 4px 14px rgba(0,0,0,.18); }
  .h1{ font-size:18px; font-weight:800; } .h2{ font-size:12px; opacity:.85; } .by{ font-size:12px; font-weight:700; color:#ffe9b0; margin-top:2px; }
  .hbar{ display:flex; align-items:center; gap:12px; }
  .htext{ flex:1; min-width:0; }
  .avatar{ width:46px; height:46px; border-radius:50%; flex:0 0 auto; object-fit:cover; border:2px solid var(--gold); box-shadow:0 2px 7px rgba(0,0,0,.28); }
  .tabs{ display:flex; gap:8px; margin-top:10px; }
  .tab{ flex:1; text-align:center; border:none; background:rgba(255,255,255,.14); color:#eaf1fb; padding:9px; border-radius:10px; font-size:13.5px; font-weight:700; cursor:pointer; }
  .tab.on{ background:#fff; color:var(--navy); }
  main{ max-width:820px; margin:0 auto; padding:12px; }
  .dash{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  .dash h3{ font-size:13px; color:var(--blue); text-transform:uppercase; letter-spacing:.05em; margin:0 0 10px; }
  .bigbar{ height:14px; background:#e7edf5; border-radius:999px; overflow:hidden; display:flex; }
  .bigbar i{ display:block; height:100%; }
  .seg-final{ background:var(--green); } .seg-2{ background:var(--accent); } .seg-1{ background:#9cc3e6; }
  .legend{ display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:10px; font-size:12px; color:var(--muted); }
  .legend b{ color:var(--ink); }
  .dot{ display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle; }
  .quick{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .qbtn{ border:1px solid var(--line); background:#fafbfd; border-radius:10px; padding:8px 12px; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--ink); }
  .qbtn .n{ color:var(--amber); }
  .chbars{ margin-top:6px; }
  .chbar{ display:flex; align-items:center; gap:8px; margin:7px 0; font-size:12.5px; }
  .chbar .nm{ flex:0 0 42px; font-weight:700; color:var(--navy); }
  .chbar .tt{ flex:1; }
  .chbar .track{ height:8px; background:#e7edf5; border-radius:999px; overflow:hidden; }
  .chbar .track i{ display:block; height:100%; background:var(--green); }
  .chbar .pc{ flex:0 0 42px; text-align:right; color:var(--muted); }
  .controls{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:12px; }
  .row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  select,input[type=search]{ flex:1; min-width:130px; border:1px solid var(--line); border-radius:9px; padding:9px 10px; font-size:13.5px; background:#fff; color:var(--ink); }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .chip{ border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; }
  .chip.on{ background:#e7eefb; border-color:var(--accent); color:var(--blue); }
  .catTitle{ font-size:12.5px; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:.04em; margin:16px 2px 8px; display:flex; justify-content:space-between; }
  .catTitle span{ color:var(--muted); font-weight:700; text-transform:none; letter-spacing:0; }
  .item{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:8px; }
  .item.r3{ border-left:4px solid var(--green); } .item.r2{ border-left:4px solid var(--accent); } .item.r1{ border-left:4px solid #9cc3e6; }
  .item.rev{ box-shadow:inset 0 0 0 1px #f0c98a; } .item.ok{ box-shadow:inset 0 0 0 1px #bcdba6; }
  .nm{ font-size:14.5px; font-weight:700; color:var(--ink); line-height:1.32; }
  .fire{ font-size:12px; color:var(--amber); font-weight:800; margin-left:6px; white-space:nowrap; }
  .note{ font-size:13px; color:#52617a; line-height:1.5; margin-top:5px; }
  .unote{ font-size:12.5px; color:#9a5a17; background:#fff6ea; border:1px solid #f0d9b8; border-radius:8px; padding:6px 9px; margin-top:7px; line-height:1.45; }
  .unote b{ color:#7a4710; }
  .editor{ width:100%; margin-top:7px; border:1px solid var(--line); border-radius:8px; padding:8px 9px; font-size:13px; font-family:inherit; color:var(--ink); resize:vertical; min-height:54px; }
  .ctrls{ display:flex; gap:7px; align-items:center; margin-top:9px; flex-wrap:wrap; }
  .stage{ border:none; border-radius:8px; padding:8px 12px; font-size:12.5px; font-weight:800; cursor:pointer; flex:1; min-width:120px; text-align:left; }
  .s0{ background:#eef1f6; color:#6a7a90; } .s1{ background:#dceaf8; color:#1f5b93; } .s2{ background:#bcd8f3; color:#16467a; } .s3{ background:#d6ecc9; color:#2f5417; }
  .mini{ border:1px solid var(--line); background:#fafbfd; border-radius:8px; min-width:40px; height:36px; padding:0 9px; font-size:14px; font-weight:700; cursor:pointer; display:grid; place-items:center; color:var(--muted); }
  .mini.on-rev{ background:#fff3e0; border-color:var(--amber); color:var(--amber); }
  .mini.on-ok{ background:#e7f3da; border-color:var(--green); color:var(--green); }
  .mini.on-note{ background:#e7eefb; border-color:var(--accent); color:var(--blue); }
  .meta{ display:flex; gap:8px; align-items:center; margin-top:7px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
  .due{ background:#fde8d6; color:#9a3c0c; border:1px solid #f3c197; border-radius:999px; padding:2px 8px; font-weight:800; font-size:10.5px; }
  .empty{ text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; }
  .rep h3{ color:var(--navy); margin:14px 0 6px; font-size:15px; }
  .rep .grp{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
  .rep .gc{ font-size:12.5px; font-weight:800; color:var(--blue); margin-bottom:6px; }
  .rep .ri{ margin:6px 0 9px; }
  .rep .rt{ font-size:13.8px; font-weight:700; }
  .rep .rn{ font-size:12.5px; color:#52617a; line-height:1.45; }
  .rep .ru{ font-size:12px; color:#9a5a17; margin-top:2px; }
  .printbtn{ border:none; background:var(--accent); color:#fff; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer; }
  .reset{ color:var(--accent); font-size:11.5px; text-decoration:underline; cursor:pointer; }
  .foot{ text-align:center; font-size:11px; color:var(--muted); padding:18px 12px 6px; }
  @media print{ header,.controls,.tabs,.quick,.printbtn{ display:none !important; } body{ background:#fff; } .grp{ break-inside:avoid; } }
</style>
</head>

<script>
const DATA = [{"ch":"Ch 1","title":"Nature, Objective & Scope of Audit","concepts":[["Meaning & objective of audit (SA 200)",true,"Independent examination of financial information to express an opinion on a true & fair view; it lends credibility. Objective: obtain reasonable assurance and report under SA 700."],["Reasonable vs absolute assurance",true,"Audit gives reasonable (high, not absolute) assurance. Absolute assurance is impossible because of the inherent limitations of an audit."],["Inherent limitations of an audit",true,"Arise from the nature of reporting (judgement/estimates), nature of procedures (sampling, management override, collusion) and the cost–time balance — so audit evidence is persuasive, not conclusive."],["Scope of audit & aspects covered",false,"Decided by the SAs, law and engagement terms. Covers reliability & sufficiency of information (accounting system + internal control) and whether it is properly disclosed."],["Audit risk = Inherent × Control × Detection",false,"Risk of an inappropriate opinion on materially misstated FS. IR and CR are the entity's (together the Risk of Material Misstatement); the auditor controls DR through the nature, timing & extent of procedures."],["Errors vs Fraud (SA 240)",true,"Error is unintentional; fraud is intentional. Two types of fraud: fraudulent financial reporting and misappropriation of assets. Maintain professional skepticism throughout."],["Fraudulent financial reporting vs misappropriation",false,"FFR = intentional misstatement to deceive users (usually management level, via override). Misappropriation = theft of assets (usually employee level), often hidden by false records."],["Financial reporting framework (fair presentation vs compliance)",false,"Fair presentation framework requires compliance plus extra disclosures (and rarely a departure) for fair view; a compliance framework requires only compliance with its requirements."],["True & fair view; general purpose FS",false,"FS should give a true & fair view / present fairly. General purpose FS are designed to meet the common information needs of a wide range of users."],["Qualities of an auditor",false,"Independence, integrity, objectivity, professional skepticism, knowledge, tact, honesty and diligence."],["Assurance engagements — elements; reasonable vs limited",true,"Five elements: three-party relationship, subject matter, criteria, evidence, written report. Reasonable assurance gives a positive opinion; limited assurance gives a negative conclusion."],["Audit vs Review engagement",true,"Audit = reasonable assurance, positive opinion. Review = limited assurance, negative conclusion (nothing has come to attention), relying mainly on inquiry and analytical procedures."],["Auditing & its relationship with other disciplines",false,"Auditing draws on accounting, law, economics, statistics, behavioural science and data analytics; the auditor needs working knowledge of all of them."],["Structure of SAs & SQC 1",false,"SQC 1 sets firm-level quality control; the SAs (numbered by topic groups) apply to audits of historical financial information."],["Advantages of audit; mandatory vs voluntary",false,"Detects errors/fraud, gives credibility, useful for loans/tax, acts as a moral check. Statutory for companies (mandatory); voluntary for proprietorships/partnerships."]]},{"ch":"Ch 2","title":"Audit Strategy, Planning & Programme","concepts":[["Benefits & nature of audit planning (SA 300)",true,"Helps focus on important areas, resolve problems on time, organise the engagement, pick the right team and direct/supervise/review and coordinate the work. Planning is continuous, not a one-off."],["Preliminary engagement activities",false,"Before planning: client acceptance/continuance (SA 220), compliance with ethics & independence, and agreeing the terms of engagement (SA 210)."],["Overall audit strategy",true,"Sets the scope, timing and direction of the audit and guides the detailed plan; considers reporting objectives, materiality, risk areas and resource deployment."],["Audit plan; strategy vs plan",true,"The plan is more detailed than the strategy: it sets the nature, timing & extent of risk assessment and further audit procedures. Strategy = overall approach; plan = how it is executed."],["Audit programme — advantages & disadvantages",true,"A written set of procedures for the team. Advantages: division of work, fixed responsibility, uniformity, control. Disadvantages: rigidity, mechanical work, stifled initiative — overcome by periodic review and revision."],["Knowledge of the business",false,"Understand the industry, the entity and regulatory/external factors to identify risks; built up before and updated throughout the audit."],["Materiality in planning (SA 320)",false,"Set materiality and performance materiality at the planning stage; revise if circumstances change; use it for the NTE of procedures and to evaluate misstatements."],["Direction, supervision and review",false,"The team is directed and supervised and its work reviewed (SA 220); the extent depends on team size, experience and the complexity of the audit."],["Revising the plan as the audit progresses",false,"The strategy and plan are updated as the audit proceeds and new information emerges; it is an iterative, not a one-time, activity."]]},{"ch":"Ch 3","title":"Risk Assessment & Internal Control","concepts":[["Audit risk model (IR / CR / DR)",true,"Audit Risk = Inherent × Control × Detection. The auditor reduces audit risk to an acceptably low level by lowering detection risk (more substantive work) where the Risk of Material Misstatement is high."],["RoMM — FS level vs assertion level",true,"Risks at the FS level are pervasive (e.g., a weak control environment); risks at the assertion level relate to specific accounts/assertions. Both drive the audit response."],["Sampling vs non-sampling risk",false,"Sampling risk: the sample is not representative of the population. Non-sampling risk: a wrong conclusion for any other reason (wrong procedure, misinterpreting evidence)."],["Risk assessment procedures (SA 315)",true,"Inquiry, analytical procedures, observation and inspection to understand the entity and identify & assess RoMM. They are mandatory but, on their own, are not a sufficient basis for the opinion."],["Understanding the entity & its environment",true,"Industry/regulatory/external factors, nature of the entity, accounting policies, objectives/strategies/business risks, performance measures, and internal control."],["Materiality & performance materiality (SA 320)",true,"Materiality is a misstatement that could influence users' decisions. Performance materiality is set lower than materiality to reduce the risk that aggregate misstatements exceed materiality."],["Internal control — meaning & objectives",true,"A process by TCWG and management giving reasonable assurance about reliable financial reporting, effective & efficient operations, and compliance with laws."],["Five components of internal control (CRIME)",true,"Control environment, Risk assessment, Information system & communication, Monitoring of controls, and (existing) Control activities."],["Control environment",false,"The foundation: governance and management's attitude, integrity and ethical values, commitment to competence, organisational structure and assignment of authority."],["Control activities & segregation of duties",false,"Authorisations, performance reviews, information processing, physical controls and segregation of duties — so that no single person controls all stages of a transaction."],["Limitations of internal control",true,"Human error, collusion, management override, cost-benefit considerations, and controls geared to routine (not unusual) transactions — so internal control gives only reasonable, not absolute, assurance."],["Tests of controls & responses (SA 330)",true,"Test operating effectiveness when relying on controls or when substantive procedures alone are insufficient; design overall responses and further procedures responsive to the assessed risks."],["Substantive procedures",false,"Tests of details plus substantive analytical procedures; mandatory for each material class of transactions, balance and disclosure regardless of the assessed risk."],["Internal Financial Controls — Sec 143(3)(i)",true,"The auditor reports on the adequacy and operating effectiveness of internal financial controls over financial reporting (ICFR), based on the ICAI Guidance Note."],["Automated environment: GITC, application controls, CAATs",true,"An IT environment brings specific risks. Rely on General IT Controls plus application controls; the auditor uses CAATs / data analytics to test large volumes of data."],["Walk-through test",false,"Tracing one or a few transactions through the system from start to finish to confirm the auditor's understanding of the process and its controls."],["Communicating deficiencies (SA 265)",false,"Communicate significant deficiencies in internal control to TCWG in writing on a timely basis; other deficiencies are communicated to management."],["Using internal auditors (SA 610)",false,"The external auditor may use the internal audit function's work or direct assistance after evaluating its objectivity, competence and systematic approach — but cannot share responsibility for the opinion."]]},{"ch":"Ch 4","title":"Audit Evidence","concepts":[["Sufficient & appropriate audit evidence (SA 500)",true,"The auditor must obtain sufficient appropriate audit evidence to draw reasonable conclusions. Sufficiency = quantity; appropriateness = relevance + reliability."],["Sufficiency vs appropriateness; reliability hierarchy",true,"The more reliable the evidence, the less is needed. Reliability rises with: external sources, effective controls, auditor-obtained, documentary form and original documents."],["The seven audit procedures",true,"Inspection, Observation, External confirmation, Recalculation, Re-performance, Analytical procedures and Inquiry."],["Assertions — transactions / balances / presentation",true,"Transactions: occurrence, completeness, accuracy, cut-off, classification. Balances: existence, rights & obligations, completeness, valuation. Plus presentation & disclosure assertions."],["Audit sampling (SA 530)",true,"Applying procedures to less than 100% of items so each has a chance of selection, to draw a conclusion about the whole population. Can be statistical or non-statistical."],["Sampling methods & sample design",false,"Random, systematic, monetary-unit, haphazard or block selection; design considers the purpose, the population, sampling risk, tolerable and expected misstatement."],["External confirmation (SA 505) — positive/negative",true,"A direct written response from a third party. Positive = reply either way (large/risky balances); negative = reply only if disagreeing (small, low-risk). The auditor controls the process and investigates exceptions."],["Inventory & litigation/claims (SA 501)",true,"Attend the physical inventory count (evaluate instructions, observe, perform test counts) and inquire of the entity's legal counsel on litigation and claims; obtain segment information."],["Opening balances (SA 510)",false,"In an initial engagement, obtain sufficient appropriate evidence that opening balances are free from misstatements affecting the current FS and that accounting policies are consistently applied."],["Analytical procedures (SA 520)",true,"Evaluating financial information through plausible relationships among data. Used as a risk-assessment tool, as a substantive procedure, and in the overall review near the end."],["Related parties (SA 550)",false,"Identify and assess RoMM from related-party relationships and transactions (a fraud-risk area); test arm's-length assertions and check disclosures."],["Using an auditor's expert (SA 620)",false,"Evaluate the expert's competence, capability and objectivity; understand the field of expertise; agree the scope; and evaluate the adequacy of the expert's work as audit evidence."]]},{"ch":"Ch 5","title":"Audit of Items of Financial Statements","concepts":[["Assertions recap — C‑R‑E‑V‑P & A‑C‑C‑A‑P‑O",true,"Balance Sheet (balances): Completeness, Rights & Obligations, Existence, Valuation, Presentation. Profit & Loss (transactions): Accuracy [Measurement], Completeness, Cut-off, Allocation [Classification], Presentation, Occurrence."],["Share Capital",false,"Compare with the prior year and resolutions; ensure within the authorised limit (MOA); Sec 52 (premium use) and Sec 53 (no issue at a discount); Schedule III reconciliation and promoter holding."],["Reserves & Surplus",false,"Trace opening balances to the prior year; check movements via the Statement of Changes in Equity; AS 4/Ind AS 10 (post-balance-sheet dividends are not a liability); securities premium used only per Sec 52."],["Borrowings",true,"Confirm directly from lenders; agree to agreements / debenture trust deeds; restate foreign currency at closing rate (AS 11); Schedule III classification, security, director guarantees and defaults; a covenant breach may make it current."],["Trade Receivables",true,"Direct confirmation (SA 505, positive/negative); agree the ageing report to the GL; cut-off; allowance for doubtful debts; AS 11; Schedule III ageing and sub-classification."],["Cash & Cash Equivalents",false,"Surprise cash count; count multiple balances simultaneously; review the bank reconciliation; obtain bank confirmations; show earmarked/margin money and deposits over 12 months separately."],["Inventories (AS 2, SA 501, CARO)",true,"Attend the physical count (SA 501); value at lower of cost and NRV (AS 2); CARO clause (ii)(a) on verification and 10% discrepancies; Schedule III classification; valuation including taxes (Sec 145A)."],["Property, Plant & Equipment (AS 10, Sch II, title deeds)",true,"Agree the physical-verification report to the fixed asset register; verify title/conveyance deeds (CARO i(c)); depreciate over Schedule II lives; AS 28 impairment; registered valuer for any revaluation."],["Intangible Assets (AS 26)",false,"AS 26 recognition (no research costs, no internally generated goodwill); amortise over the pattern of benefits; AS 28 impairment; title in the entity's name; ageing of assets under development."],["Trade Payables & Other Current Liabilities",true,"Completeness is key — search for unrecorded liabilities; cut-off (last invoices, gate-entry dates); MSME disclosures and the ageing schedule; AS 11 restatement; vendor confirmations."],["Loans, Advances & Other Current Assets",false,"Confirm principal plus interest; check agreements and board approval; arm's length for related parties; AS 11 restatement; Schedule III classification and the promoter/director/KMP disclosure table."],["Provisions & Contingent Liabilities (AS 29)",true,"AS 29: a provision needs a present obligation, probable outflow and a reliable estimate. Use of a management's expert/actuary is governed by SA 500. A contingent liability is disclosed, not provided; give AS 29 movement tables."],["Sales & Revenue (AS 9, SA 240)",true,"Occurrence is the high-risk assertion; SA 240 presumes a fraud risk in revenue recognition. AS 9 recognition; cut-off on transfer of risks & rewards; reconcile with GST; SA 505 customer confirmations."],["Other Income",false,"Interest on a time-proportion basis (recompute, reconcile with Form 26AS); dividend when the right to receive is established; gain/loss = redemption price minus carrying value; classify and disclose undisclosed income."],["Purchases",true,"Confirm vendor genuineness; GRN and a 2-way/3-way match; cut-off using the gate-inward register; goods in transit per delivery terms; analytical review (consumption, ratios); related-party Board approval."],["Employee Benefits Expenses (AS 15)",false,"Check for fictitious employees; salary register for 12 months and variance analysis; AS 15 for gratuity/leave (actuarial); PF/ESI challans for timely deposit; Schedule III (Part II) heads."],["Depreciation & Amortisation (ready-for-use)",true,"Depreciation starts when the asset is ready for use, not when first put to use; Schedule II useful lives; residual value; component depreciation; recompute and compare with the Income Tax Act."],["Other Expenses (CSR, crypto)",false,"Verify supporting documents and authorisation; rent/insurance over 12 months and prepaid split; legal expenses may signal undisclosed disputes; CSR (Sec 135) and cryptocurrency disclosures."],["Schedule III disclosures & ageing schedules",true,"Ageing schedules for trade receivables/payables, CWIP and intangibles under development; title-deeds table; prescribed ratios; correct current/non-current classification."],["IPAC structure for practical questions",true,"Issue → Provision (the AS/SA/section) → Analysis (apply it to the facts) → Conclusion. The standard skeleton for case-study answers."]]},{"ch":"Ch 6","title":"Audit Documentation","concepts":[["Meaning & purposes (SA 230)",true,"The record of procedures performed, evidence obtained and conclusions reached (working papers). It evidences the basis for the opinion and that the audit was planned and performed per the SAs."],["Form, content & extent of documentation",true,"Enough for an experienced auditor with no prior connection to understand the nature, timing & extent of procedures, the results and evidence, significant matters and the conclusions reached."],["The ‘experienced auditor’ standard",false,"The benchmark for documentation: another competent auditor could understand the work without oral explanation."],["Assembly (60 days) & retention (7 years)",true,"Assemble the final audit file within 60 days of the auditor's report; retain it for at least 7 years (per SQC 1)."],["Permanent vs current audit file",true,"Permanent file: information of continuing use (MOA/AOA, structure, key agreements). Current file: matters of the year under audit (FS, programme, evidence, queries)."],["Ownership & confidentiality of working papers",false,"Working papers are the auditor's property and are kept confidential; the auditor may, at discretion, make portions available to the client."]]},{"ch":"Ch 7","title":"Completion and Review","concepts":[["Subsequent events — adjusting/non-adjusting (SA 560)",true,"Events between the FS date and the report date are adjusted or disclosed; facts discovered after the report carry their own duties. Obtain evidence that all are appropriately reflected."],["Three windows of subsequent events",false,"(1) FS date to report date — active duty to obtain evidence; (2) after report but before issue; (3) after FS issued — each window has different responsibilities."],["Going concern & reporting grid (SA 570)",true,"If a material uncertainty is adequately disclosed → unmodified opinion + a Material Uncertainty paragraph. If not disclosed → qualified/adverse. If the going concern basis is inappropriate → adverse opinion."],["Material uncertainty section",false,"Use a separate heading, Material Uncertainty Related to Going Concern, when a material uncertainty exists but is adequately disclosed in the FS."],["Evaluating misstatements (SA 450)",true,"Accumulate misstatements (other than clearly trivial), assess them individually and in aggregate against materiality, request correction, and consider the effect of uncorrected ones on the opinion."],["Written representations (SA 580)",true,"Management confirms its responsibilities and the completeness of information. They are necessary but not sufficient evidence, are dated near the report, and refusal affects the opinion."],["Communication with TCWG (SA 260)",false,"Communicate the auditor's responsibilities, the planned scope and timing, significant findings, and (for listed entities) independence — two-way and timely."],["Significant deficiencies (SA 265)",false,"Communicate significant deficiencies in internal control to TCWG in writing; a significant deficiency is one meriting their attention."]]},{"ch":"Ch 8","title":"Audit Report","concepts":[["Forming an opinion & report structure (SA 700)",true,"Title, addressee, Opinion, Basis for Opinion, Going Concern, Key Audit Matters, responsibilities of management and the auditor, other reporting responsibilities, signature with UDIN, place and date."],["Unmodified opinion wording",false,"States that the FS give a true and fair view / present fairly in accordance with the framework; given when the FS are free from material misstatement."],["Modified opinions grid (SA 705)",true,"Qualified (material but not pervasive), Adverse (material and pervasive misstatement), Disclaimer (unable to obtain evidence, material and pervasive). The driver is misstatement vs inability to obtain evidence."],["Emphasis of Matter & Other Matter (SA 706)",true,"EOM draws attention to a matter already in the FS that is fundamental to users' understanding (not a modification). Other Matter relates to something not in the FS but relevant to users."],["Key Audit Matters (SA 701)",true,"The matters of most significance in the current audit, drawn from those communicated to TCWG; mandatory for listed entities; not a substitute for an opinion or a modification."],["Comparatives (SA 710)",false,"Corresponding figures vs comparative financial statements — the auditor's responsibility and how the report refers to them differ between the two approaches."],["UDIN",false,"A Unique Document Identification Number generated on the ICAI portal to prevent forgery of certificates and reports by persons impersonating CAs."],["Sec 143 — inquiry / reporting / fraud reporting",true,"143(1): matters of inquiry. 143(3): contents of the auditor's report. 143(12): report fraud — ≥₹1 crore to the Central Government, below that to the Board/Audit Committee."],["CARO 2020 — applicability & clauses",true,"Applies to most companies (excludes small companies, OPC, banking, insurance, Sec 8, etc.). 21 clauses, e.g., PPE & title deeds, inventory, loans, deposits, statutory dues and fraud."],["Branch audit (Sec 143(8)) & joint audit (SA 299)",false,"A branch may be audited by the company's auditor or another auditor. Joint auditors divide the work but are jointly and severally responsible for common areas."]]},{"ch":"Ch 9","title":"Special Features — Audit of Different Entities","concepts":[["Government audit & the C&AG",true,"The C&AG (a constitutional authority, Art. 148) audits government receipts and expenditure and ensures the executive's accountability to Parliament."],["Expenditure audit; propriety & performance audit (3 Es)",true,"Audit against provision of funds, sanction, rules and regularity; propriety audit looks at wisdom and economy; performance / value-for-money audit covers Economy, Efficiency and Effectiveness."],["Sec 143(5)/(6) — government company audit",false,"The C&AG appoints the auditor (from its empanelled CAs) and may issue directions; the C&AG also has rights of supplementary audit and to comment on the report."],["LLP audit",true,"Audit is required where turnover exceeds ₹40 lakh or contribution exceeds ₹25 lakh; verify the LLP agreement, partners' contributions and the designated partners' compliances."],["Co-operative society audit",true,"Under the Co-operative Societies Act; the auditor comes from an approved panel. Special points: overdue debts and their percentage, and observance of the Act, rules and bye-laws."],["Multi-State co-operative society audit",false,"Governed by the Multi-State Co-operative Societies Act, 2002; a CA is appointed by the society in its AGM and reports to the society and the Central Registrar."],["Charitable institutions / NGOs (FCRA)",true,"Verify the constitution, registration (12A/80G), grants and donations, and the application of funds; FCRA registration is needed for foreign contributions."],["Educational institutions & hospitals",false,"Institutions: fees, admissions, grants and government rules. Hospitals: patient billing, pharmacy stock and compliance with free-bed/charitable conditions."],["Cinema & hotels",false,"Cinema: ticket sales, entertainment tax and the sequence/serial control of tickets. Hotels: occupancy, room tariffs, stock of provisions and food & beverage."],["Hire-purchase & leasing companies",false,"Verify the HP/lease agreements, instalments, interest, and repossession; check revenue recognition."],["Local bodies / value-for-money audit",false,"Municipalities and panchayats: budgetary control and propriety, with a value-for-money focus."]]},{"ch":"Ch 10","title":"Audit of Banks","concepts":[["Bank audit framework, RBI & appointment",false,"Governed by the Banking Regulation Act and RBI norms; statutory branch and central auditors are appointed; the audit follows RBI and ICAI guidance."],["Special reports — LFAR & others",false,"The Long Form Audit Report is a detailed questionnaire (especially on advances); other deliverables include the tax audit and various certificates."],["Advances — funded vs non-funded",true,"Funded: cash credit, overdraft, term loans, bills. Non-funded: letters of credit and bank guarantees (contingent until invoked)."],["Creation of security (mortgage/pledge/hypothecation)",true,"Mortgage (immovable property), Pledge (movables, possession with the lender), Hypothecation (movables, possession with the borrower), plus Assignment and Lien."],["NPA / IRAC norms",true,"An advance becomes an NPA when interest or principal is overdue beyond 90 days. Income Recognition & Asset Classification norms apply; income on an NPA is recognised only on receipt."],["Asset classification rules",true,"Standard; Sub-standard (NPA up to 12 months); Doubtful (NPA over 12 months); Loss assets. Provisioning rises as the asset deteriorates."],["Drawing power computation",true,"DP = (stock + debtors − creditors) after applying the margin; verify stock statements. An account is flagged NPA if the outstanding persistently exceeds the DP/limit."],["Special Mention Accounts (SMA)",true,"Early-warning categories before NPA: SMA-0 (overdue 1–30 days), SMA-1 (31–60 days), SMA-2 (61–90 days)."],["Income recognition on NPAs",false,"Interest on an NPA is not taken on an accrual basis — only on actual receipt; any unrealised interest already booked must be reversed."],["Provisioning norms",false,"Standard 0.25–1%; Sub-standard ~15% (25% if unsecured); Doubtful 25–100% on the secured portion plus 100% on the unsecured; Loss assets 100%."],["CARO not applicable to banks",false,"CARO 2020 does not apply to banking companies (nor to insurance, Sec 8, small companies or OPCs)."]]},{"ch":"Ch 11","title":"Ethics & Terms of Audit Engagements","concepts":[["Five fundamental principles",true,"Integrity, Objectivity, Professional competence & due care, Confidentiality, and Professional behaviour."],["Confidentiality & its exceptions",true,"Do not disclose client information. Exceptions: where permitted by law or the client, where there is a legal duty (e.g., a court order), or a professional duty/right (peer review, defending oneself, ICAI requirements)."],["Independence — of mind & in appearance",true,"Independence of mind is an unbiased state of mind; independence in appearance means avoiding facts or circumstances a reasonable third party would see as compromising independence."],["The five threats to independence",true,"Self-interest, Self-review, Advocacy, Familiarity and Intimidation."],["Safeguards & the threat ladder",true,"Identify the threat → evaluate its significance → apply safeguards (created by the profession/legislation or by the work environment) → if it cannot be reduced to an acceptable level, decline or withdraw."],["Professional skepticism (SA 200)",true,"A questioning mind, alert to possible misstatement or fraud, with a critical assessment of evidence — neither assuming management is honest nor dishonest."],["Preconditions for an audit (SA 210)",true,"An acceptable financial reporting framework plus management's agreement to its responsibilities (the premise). If these are absent, the engagement should not be accepted."],["Engagement letter contents; recurring audit",true,"Objective and scope, the responsibilities of each party, the framework and the expected form of report. For a recurring audit, send a fresh letter if terms are misunderstood, changed, or the law changes."],["Change in terms of engagement",false,"Do not agree to a change without reasonable justification; downgrading an audit to a review needs a valid reason. If there is no reasonable basis and it is not permitted, withdraw."],["Sec 144 (services not to render) & Sec 146 (attend GM)",false,"Sec 144 lists services the auditor cannot provide (bookkeeping, internal audit, actuarial, investment and management services, etc.). Sec 146 requires the auditor to attend general meetings unless exempted."],["SQC 1 — six elements",true,"Leadership responsibilities, Ethical requirements, Acceptance & continuance, Human resources, Engagement performance, and Monitoring."],["SA 220 — engagement-level QC & EQCR",true,"The engagement partner is responsible for overall quality on the engagement; an Engagement Quality Control Review is done for listed/high-risk engagements before the report is signed."]]}];
const TOTAL = 132;
const DUE_DAYS = 10;
DATA.forEach((c,ci)=> c.concepts.forEach((x,i)=> x.id='c'+ci+'_'+i));
const STAGES = ["Not started","1st read","2nd read","Final read ✓"];
const SCLS = ["s0","s1","s2","s3"];

let store = {};
try{ store = JSON.parse(localStorage.getItem('auditRevTracker')||'{}'); }catch(e){ store={}; }
// migrate old {rev:true} -> {conf:'rev'}
let migrated=false;
Object.keys(store).forEach(k=>{ const s=store[k]; if(s && s.rev!==undefined){ if(s.rev && !s.conf) s.conf='rev'; delete s.rev; migrated=true; } if(s && s.conf===undefined) s.conf=''; });
function save(){ try{ localStorage.setItem('auditRevTracker', JSON.stringify(store)); }catch(e){} }
if(migrated) save();

function get(id){ const s=store[id]; return s?{r:s.r||0,conf:s.conf||'',un:s.un||'',ts:s.ts}:{r:0,conf:'',un:'',ts:0}; }
function persist(id,s){ if(!s.r && !s.conf && !s.un) delete store[id]; else store[id]=s; save(); }
function setStage(id,r){ const s=get(id); s.r=r; s.ts=Date.now(); persist(id,s); }
function bumpStage(id){ const s=get(id); s.r=Math.min(3,(s.r||0)+1); s.ts=Date.now(); persist(id,s); }
function setConf(id,val){ const s=get(id); s.conf = (s.conf===val)?'' : val; s.ts=Date.now(); persist(id,s); }
function setNote(id,txt){ const s=get(id); s.un=txt; s.ts=Date.now(); persist(id,s); }
function isDue(s){ return (s.r>=1) && s.conf!=='ok' && s.ts && (Date.now()-s.ts) > DUE_DAYS*86400000; }
function daysAgo(ts){ if(!ts) return ''; const d=Math.floor((Date.now()-ts)/86400000); return d<=0?'today':d===1?'1 day ago':d+' days ago'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let view='track', state={ cat:'all', filter:'all', q:'', editing:null };
const $=id=>document.getElementById(id);

function counts(){
  let r=[0,0,0,0], rev=0, ok=0, due=0, hot=0, hotDone=0;
  DATA.forEach(c=>c.concepts.forEach(x=>{ const s=get(x.id); r[s.r||0]++; if(s.conf==='rev') rev++; if(s.conf==='ok') ok++; if(isDue(s)) due++; if(x[1]){ hot++; if((s.r||0)===3) hotDone++; } }));
  return {r, rev, ok, due, hot, hotDone};
}
function chPct(c){ let done=0; c.concepts.forEach(x=>{ if((get(x.id).r||0)===3) done++; }); return {done, total:c.concepts.length, pct: Math.round(done/c.concepts.length*100)}; }

function renderDash(){
  const cc=counts(); const w=t=>(t/TOTAL*100).toFixed(1)+'%';
  let html='<div class="dash"><h3>Overall progress</h3>';
  html+='<div class="bigbar"><i class="seg-final" style="width:'+w(cc.r[3])+'"></i><i class="seg-2" style="width:'+w(cc.r[2])+'"></i><i class="seg-1" style="width:'+w(cc.r[1])+'"></i></div>';
  html+='<div class="legend">'
    +'<span><i class="dot" style="background:var(--green)"></i><b>'+cc.r[3]+'</b> Final</span>'
    +'<span><i class="dot" style="background:var(--accent)"></i><b>'+cc.r[2]+'</b> 2nd</span>'
    +'<span><i class="dot" style="background:#9cc3e6"></i><b>'+cc.r[1]+'</b> 1st</span>'
    +'<span><i class="dot" style="background:#e7edf5"></i><b>'+cc.r[0]+'</b> Not started</span>'
    +'<span>of <b>'+TOTAL+'</b></span></div>';
  html+='<div class="quick">'
    +'<button class="qbtn" data-f="r0">📕 Not read <span class="n">('+cc.r[0]+')</span></button>'
    +'<button class="qbtn" data-f="rev">🔁 Revise <span class="n">('+cc.rev+')</span></button>'
    +'<button class="qbtn" data-f="ok">✅ Confident <span class="n">('+cc.ok+')</span></button>'
    +'<button class="qbtn" data-f="due">⏰ Due <span class="n">('+cc.due+')</span></button>'
    +'<button class="qbtn" data-f="hot">🔥 Important <span class="n">('+cc.hotDone+'/'+cc.hot+')</span></button>'
    +'</div>';
  html+='<div class="chbars">';
  DATA.forEach((c)=>{ const p=chPct(c); html+='<div class="chbar"><span class="nm">'+c.ch+'</span><span class="tt"><span class="track"><i style="width:'+p.pct+'%"></i></span></span><span class="pc">'+p.done+'/'+p.total+'</span></div>'; });
  html+='</div></div>';
  return html;
}
function renderControls(){
  let opts='<option value="all">All chapters</option>'+DATA.map(c=>'<option value="'+c.ch+'">'+c.ch+' — '+esc(c.title)+'</option>').join('');
  const f=state.filter; const chip=(v,l)=>'<button class="chip '+(f===v?'on':'')+'" data-flt="'+v+'">'+l+'</button>';
  return '<div class="controls"><div class="row">'
    +'<select id="catSel">'+opts+'</select>'
    +'<input id="q" type="search" placeholder="Search a topic…" autocomplete="off"/></div>'
    +'<div class="chips">'+chip('all','All')+chip('r0','📕 Not started')+chip('prog','◐ In progress')+chip('r3','✓ Final')+chip('rev','🔁 Revise')+chip('ok','✅ Confident')+chip('due','⏰ Due')+chip('hot','🔥 Important')+'</div></div>';
}
function passFilter(x){
  const s=get(x.id), r=s.r||0;
  if(state.q){ const q=state.q.toLowerCase(); if(!x[0].toLowerCase().includes(q) && !x[2].toLowerCase().includes(q)) return false; }
  switch(state.filter){
    case 'r0': return r===0;
    case 'prog': return r===1||r===2;
    case 'r3': return r===3;
    case 'rev': return s.conf==='rev';
    case 'ok': return s.conf==='ok';
    case 'due': return isDue(s);
    case 'hot': return !!x[1];
    default: return true;
  }
}
function itemNode(x){
  const s=get(x.id), r=s.r||0, due=isDue(s);
  const d=document.createElement('div');
  d.className='item '+(r===3?'r3':r===2?'r2':r===1?'r1':'')+(s.conf==='rev'?' rev':'')+(s.conf==='ok'?' ok':'');
  d.innerHTML='<div class="nm"></div><div class="note"></div>'
    +(s.un&&state.editing!==x.id?'<div class="unote"><b>My note:</b> '+esc(s.un)+'</div>':'')
    +(state.editing===x.id?'<textarea class="editor" placeholder="Your note — e.g. what is unclear, a mnemonic, a page ref…"></textarea>':'')
    +'<div class="ctrls">'
    +'<button class="stage '+SCLS[r]+'" data-act="bump">'+STAGES[r]+'</button>'
    +'<button class="mini" data-act="back" title="Step back">↩</button>'
    +'<button class="mini '+(s.conf==='rev'?'on-rev':'')+'" data-act="rev" title="Needs revision">🔁</button>'
    +'<button class="mini '+(s.conf==='ok'?'on-ok':'')+'" data-act="ok" title="Confident">✅</button>'
    +'<button class="mini '+(state.editing===x.id?'on-note':(s.un?'on-note':''))+'" data-act="note" title="Add a note">📝</button>'
    +'</div>'
    +'<div class="meta">'+(s.ts?'<span>updated '+daysAgo(s.ts)+'</span>':'')+(due?'<span class="due">⏰ due to revisit</span>':'')+'</div>';
  d.querySelector('.nm').textContent=x[0];
  if(x[1]){ const f=document.createElement('span'); f.className='fire'; f.textContent='🔥 important'; d.querySelector('.nm').appendChild(f); }
  d.querySelector('.note').textContent=x[2];
  d.querySelector('[data-act=bump]').onclick=()=>{ bumpStage(x.id); rerender(); };
  d.querySelector('[data-act=back]').onclick=()=>{ const st=get(x.id); setStage(x.id, Math.max(0,(st.r||0)-1)); rerender(); };
  d.querySelector('[data-act=rev]').onclick=()=>{ setConf(x.id,'rev'); rerender(); };
  d.querySelector('[data-act=ok]').onclick=()=>{ setConf(x.id,'ok'); rerender(); };
  d.querySelector('[data-act=note]').onclick=()=>{ state.editing = (state.editing===x.id?null:x.id); rerender(); };
  const ta=d.querySelector('.editor');
  if(ta){ ta.value=s.un||''; ta.oninput=()=>setNote(x.id, ta.value); setTimeout(()=>ta.focus(),0); }
  return d;
}
function renderTracker(){
  const main=$('main'); main.innerHTML=renderDash()+renderControls()+'<div id="list"></div>';
  wireControls();
  const list=$('list'); list.innerHTML=''; let any=false;
  DATA.forEach(c=>{
    if(state.cat!=='all' && c.ch!==state.cat) return;
    const items=c.concepts.filter(passFilter);
    if(!items.length) return; any=true;
    const p=chPct(c);
    const h=document.createElement('div'); h.className='catTitle';
    h.innerHTML='<span style="color:var(--blue)">'+c.ch+' · '+esc(c.title)+'</span><span>'+p.done+'/'+p.total+' final</span>';
    list.appendChild(h);
    items.forEach(x=> list.appendChild(itemNode(x)));
  });
  if(!any) list.innerHTML='<div class="empty">No topics match this filter. Try “All” or clear the search.</div>';
}
function wireControls(){
  $('catSel').value=state.cat; $('catSel').onchange=e=>{ state.cat=e.target.value; state.editing=null; renderTracker(); };
  $('q').value=state.q; $('q').oninput=e=>{ state.q=e.target.value; renderTracker(); };
  document.querySelectorAll('[data-flt]').forEach(b=> b.onclick=()=>{ state.filter=b.dataset.flt; state.editing=null; renderTracker(); });
  document.querySelectorAll('[data-f]').forEach(b=> b.onclick=()=>{ state.filter=b.dataset.f; state.cat='all'; state.editing=null; renderTracker(); window.scrollTo({top:0}); });
}
function rerender(){ if(view==='track') renderTracker(); else renderReport(); }

function renderReport(){
  const main=$('main');
  function group(test, withNotes){
    let out=''; let found=false;
    DATA.forEach(c=>{
      const items=c.concepts.filter(x=>test(x));
      if(!items.length) return; found=true;
      out+='<div class="grp"><div class="gc">'+c.ch+' · '+esc(c.title)+'</div>';
      items.forEach(x=>{ const s=get(x.id);
        out+='<div class="ri"><div class="rt">'+esc(x[0])+(x[1]?' 🔥':'')+'</div>';
        if(withNotes){ out+='<div class="rn">'+esc(x[2])+'</div>'; if(s.un) out+='<div class="ru">📝 '+esc(s.un)+'</div>'; }
        out+='</div>';
      });
      out+='</div>';
    });
    return found?out:'<div class="empty">Nothing here — nicely done!</div>';
  }
  const cc=counts();
  main.innerHTML='<div class="rep">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:13px;color:var(--muted)">What to do next — with revision notes.</div><button class="printbtn" onclick="window.print()">⎙ Print / Save PDF</button></div>'
    +'<h3>🔁 Marked for revision ('+cc.rev+')</h3>'+group(x=>get(x.id).conf==='rev', true)
    +'<h3>⏰ Due for revisit ('+cc.due+')</h3>'+group(x=>isDue(get(x.id)), true)
    +'<h3>📕 Not yet read ('+cc.r[0]+')</h3>'+group(x=>(get(x.id).r||0)===0, false)
    +'<h3>◐ In progress — read once or twice ('+(cc.r[1]+cc.r[2])+')</h3>'+group(x=>{const r=get(x.id).r||0;return r===1||r===2;}, false)
    +'</div>';
}

$('tabTrack').onclick=()=>{ view='track'; $('tabTrack').classList.add('on'); $('tabReport').classList.remove('on'); renderTracker(); };
$('tabReport').onclick=()=>{ view='report'; $('tabReport').classList.add('on'); $('tabTrack').classList.remove('on'); renderReport(); };
$('reset').onclick=()=>{ if(confirm('Clear all progress, notes and marks on this device?')){ store={}; save(); state.editing=null; rerender(); } };

renderTracker();
</script>
</body>
</html>
