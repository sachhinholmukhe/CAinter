<style>

<script>
const CHAPTERS = [{"ch":"Chapter 10","title":"Audit of Banks","tagline":"When the money is everyone’s","runtime":"~1 min 30 sec","accent":"1F3864","scenes":[{"time":"0:00","icon":"🏦","key":"It’s the public’s money","visual":"A bank; many small depositors behind it.","narration":"A bank is different. The money it lends is, in the end, the public’s — your deposit, a pensioner’s savings. So when a bank loan goes bad, the danger spreads far."},{"time":"0:18","icon":"📉","key":"Focus: advances","visual":"A spotlight on ‘Advances’; a loan turning red.","narration":"The auditor’s sharpest focus is on advances — the loans. A loan that stops being repaid becomes a Non-Performing Asset: interest or principal overdue beyond ninety days, an overdraft ‘out of order.’"},{"time":"0:38","icon":"⚠️","key":"Recovery, not security","visual":"Record of recovery beats a big house as security; one bad loan flags the borrower.","narration":"And a bank can’t call a loan healthy just because the borrower owns a big house. Classification follows the record of recovery, not the security — and the borrower, not just one loan. Income on a bad loan waits until it’s actually received."},{"time":"0:58","icon":"📊","key":"Sharp tools","visual":"Drawing power from paid stock; SMA early-warning flags.","narration":"There are sharp tools — drawing power from real, paid-for stock and good debtors; early-warning flags before a loan turns bad; provisioning rules for every category. Get them wrong, and a bank looks healthier than it is."},{"time":"1:18","icon":"🛡️","key":"Guardian of trust","visual":"The auditor as a guardian; RBI rulebook.","narration":"The bank auditor is a guardian of trust on a large scale. In this chapter: bank audit and its special reports, advances and security, the NPA prudential norms, drawing power, and the audit of revenue and expenses."}]}];
let ci=0, si=0, playing=false, timer=null, fillRAF=null, voice=true;
const $=id=>document.getElementById(id);
const stage=$("stage");
function dur(text){ return Math.max(6200, Math.min(15000, text.split(/\s+/).length*360+1400)); }
function paintDots(){ $("dots").innerHTML = CHAPTERS[ci].scenes.map((_,i)=>'<span class="dot '+(i===si?'on':'')+'"></span>').join(""); }
function render(){
  const c=CHAPTERS[ci], s=c.scenes[si];
  $("endcard").classList.remove("show");
  $("chLbl").textContent=c.ch+"  ·  "+c.runtime;
  $("tiLbl").textContent=c.title; $("tgLbl").textContent="“"+c.tagline+"”";
  $("icon").textContent=s.icon; $("key").textContent=s.key; $("cap").textContent=s.narration;
  const body=stage.querySelector(".body"); body.classList.remove("scene-enter"); void body.offsetWidth; body.classList.add("scene-enter");
  $("meta").textContent="Scene "+(si+1)+" / "+c.scenes.length;
  paintDots(); $("pfill").style.transition='none'; $("pfill").style.width='0%';
}
function clearTimers(){ if(timer){clearTimeout(timer);timer=null;} if(window.speechSynthesis) speechSynthesis.cancel(); if(fillRAF) cancelAnimationFrame(fillRAF); }
function runFill(ms){ const start=performance.now(); function step(t){ const p=Math.min(1,(t-start)/ms); $("pfill").style.transition='none'; $("pfill").style.width=(p*100)+'%'; if(p<1&&playing) fillRAF=requestAnimationFrame(step);} fillRAF=requestAnimationFrame(step); }
function speakAndAdvance(){
  const s=CHAPTERS[ci].scenes[si], ms=dur(s.narration); runFill(ms);
  if(voice && 'speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(s.narration); u.rate=0.98; u.pitch=1.0;
    let done=false; const go=()=>{ if(done)return; done=true; next(true); }; u.onend=go;
    timer=setTimeout(go, ms+1800); speechSynthesis.cancel(); speechSynthesis.speak(u);
  } else { timer=setTimeout(()=>next(true), ms); }
}
function play(){ playing=true; $("playBtn").textContent="⏸"; clearTimers(); speakAndAdvance(); }
function pause(){ playing=false; $("playBtn").textContent="▶"; clearTimers(); }
function toggle(){ playing?pause():play(); }
function next(auto){ clearTimers(); const c=CHAPTERS[ci]; if(si<c.scenes.length-1){ si++; render(); if(playing) speakAndAdvance(); } else { showEnd(); } }
function prev(){ clearTimers(); if(si>0) si--; render(); if(playing) speakAndAdvance(); }
function restart(){ clearTimers(); si=0; render(); play(); }
function showEnd(){ playing=false; $("playBtn").textContent="▶"; clearTimers(); const c=CHAPTERS[ci];
  $("endTitle").textContent="✓  "+c.ch; $("endText").textContent="That’s the context for “"+c.title+".” Now open the chapter and dive into the detail."; $("endcard").classList.add("show"); }
$("playBtn").onclick=toggle; $("nextBtn").onclick=()=>next(false); $("prevBtn").onclick=prev; $("restartBtn").onclick=restart;
$("voiceChk").onchange=e=>{ voice=e.target.checked; if(playing){ clearTimers(); speakAndAdvance(); } };
$("replayBtn").onclick=()=>{ si=0; render(); play(); };
document.addEventListener("keydown",e=>{ if(e.code==="Space"){e.preventDefault();toggle();} else if(e.code==="ArrowRight") next(false); else if(e.code==="ArrowLeft") prev(); });
render(); if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=()=>{}; speechSynthesis.getVoices(); }
</script>
