<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<title>CA Inter · Audit — Chapter 3 Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1EA; --card:#FFFFFF; --ink:#222A35; --muted:#6A7180;
    --navy:#1F3864; --navy2:#284a82; --accent:#2E75B6; --gold:#BF8F00;
    --green:#2F7D32; --green-bg:#E7F2E3; --red:#B23A2E; --red-bg:#FBE9E6;
    --soft:#EBF0F8; --line:#E4DFD4; --shadow:0 10px 30px rgba(31,56,100,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #fbfaf6 0%, rgba(251,250,246,0) 60%),
      repeating-linear-gradient(135deg, rgba(31,56,100,.020) 0 2px, transparent 2px 22px),
      var(--paper);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{width:100%;max-width:520px;padding:14px 16px 28px;display:flex;flex-direction:column;min-height:100dvh}

  /* Header */
  header{padding:6px 2px 12px}
  .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .ttl{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);font-size:25px;line-height:1.1;margin:3px 0 0;letter-spacing:-.01em}
  .ttl b{color:var(--gold);font-weight:600}
  .meta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .bar{flex:1;height:8px;border-radius:99px;background:#e6e2d8;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--navy));transition:width .35s ease}
  .count{font-weight:800;color:var(--navy);font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .score{font-weight:800;color:var(--green);font-size:13px;white-space:nowrap}

  /* Card */
  .stage{flex:1;display:flex;align-items:flex-start;padding-top:6px}
  .card{
    width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    border:1px solid #efece4;overflow:hidden;position:relative;animation:pop .32s cubic-bezier(.2,.7,.2,1)
  }
  .card:before{content:"";position:absolute;inset:0 0 auto;height:5px;background:linear-gradient(90deg,var(--navy),var(--accent) 60%,var(--gold))}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .card.swipe-l{animation:outL .22s ease forwards}
  .card.swipe-r{animation:outR .22s ease forwards}
  @keyframes outL{to{opacity:0;transform:translateX(-26px)}}
  @keyframes outR{to{opacity:0;transform:translateX(26px)}}
  .cbody{padding:18px 18px 20px}
  .pill{display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;
    color:#7a5c00;background:#FBF1D2;border:1px solid #efdfa6;padding:5px 10px;border-radius:99px}
  .qno{float:right;font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  .q{font-family:'Fraunces',serif;font-weight:500;font-size:19px;line-height:1.42;color:var(--navy);margin:14px 0 16px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fbfaf7;border:1.5px solid #e7e2d8;border-radius:13px;padding:12px 13px;font:inherit;color:var(--ink);
    font-size:14.5px;line-height:1.34;transition:border-color .15s,background .15s,transform .08s}
  .opt:active{transform:scale(.992)}
  .opt .lab{flex:none;width:24px;height:24px;border-radius:7px;background:var(--soft);color:var(--navy);
    font-weight:800;font-size:13px;display:grid;place-items:center;margin-top:-1px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .lab{background:var(--green);color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .lab{background:var(--red);color:#fff}
  .opt.dim{opacity:.62}
  .opt[disabled]{cursor:default}

  .exp{margin-top:15px;border-radius:13px;background:linear-gradient(180deg,#f6f9ff,#eef3fb);
    border:1px solid #d7e3f5;border-left:5px solid var(--accent);padding:13px 14px;
    max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease,margin .3s ease}
  .exp.show{max-height:420px;opacity:1}
  .exp .verdict{font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:5px}
  .exp .verdict.ok{color:var(--green)} .exp .verdict.no{color:var(--red)}
  .exp p{margin:0;font-size:14px;line-height:1.5;color:#33404f}
  .exp .ans{color:var(--navy);font-weight:700}

  /* Controls */
  .controls{margin-top:16px;display:flex;align-items:center;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px 12px;font:inherit;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .08s,filter .15s,opacity .15s}
  .btn:active{transform:translateY(1px)}
  .btn.prev{flex:none;width:54px;background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn.next{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(31,56,100,.25)}
  .btn.next:disabled{opacity:.45;box-shadow:none}
  .btn.reveal{background:#fff;border:1.5px solid var(--gold);color:#7a5c00;flex:none;width:auto;padding:14px 16px}
  .tools{margin-top:11px;display:flex;justify-content:center;gap:18px}
  .tool{background:none;border:none;font:inherit;font-weight:700;font-size:12.5px;color:var(--muted);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
  .tool:active{color:var(--navy)}
  .tool svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  .hint{text-align:center;color:#9a9384;font-size:11.5px;margin-top:14px;letter-spacing:.02em}

  /* Done screen */
  .done{width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid #efece4;
    padding:30px 22px;text-align:center;animation:pop .35s ease}
  .done .big{font-family:'Fraunces',serif;font-size:54px;font-weight:600;color:var(--navy);line-height:1}
  .done .big small{font-size:24px;color:var(--muted)}
  .done h2{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);margin:6px 0 2px;font-size:23px}
  .done p{color:var(--muted);font-size:14px;margin:4px 0 18px}
  .done .row{display:flex;gap:10px}
  .ring{width:118px;height:118px;margin:4px auto 8px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--gold) var(--deg,0deg), #ece7da 0deg)}
  .ring .inner{width:96px;height:96px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:inset 0 0 0 1px #efece4}
  .hidden{display:none!important}

  .hbar{ display:flex; align-items:center; gap:10px; }
  .htext{ flex:1; min-width:0; }
  .avatar{ width:42px; height:42px; border-radius:50%; flex:0 0 auto; object-fit:cover; border:2px solid #BF8F00; box-shadow:0 2px 6px rgba(0,0,0,.28); }
</style>

<script>
const DECK = [
 {c:"Audit risk", q:"Audit risk is a function of:",
  o:["Inherent risk only","The risks of material misstatement and detection risk","Detection risk only","Sampling risk and the audit fee"], a:1,
  e:"Audit risk = Risk of Material Misstatement × Detection Risk; and RMM = Inherent Risk × Control Risk."},
 {c:"RMM", q:"The risk of material misstatement at the assertion level comprises:",
  o:["Inherent risk and detection risk","Inherent risk and control risk","Control risk and detection risk","Sampling and non-sampling risk"], a:1,
  e:"RMM has two components — inherent risk and control risk — both of which are the entity’s risks, existing independently of the audit."},
 {c:"Detection risk", q:"For a given level of audit risk, detection risk bears what relationship with the assessed RMM?",
  o:["Direct (same direction)","Inverse","No relationship","A fixed ratio"], a:1,
  e:"Inverse: the higher the assessed RMM, the lower the detection risk the auditor can accept — so more, or more effective, procedures are needed."},
 {c:"Inherent risk", q:"Inherent risk is the susceptibility of an assertion to a material misstatement, before considering:",
  o:["Any related controls","Detection risk","Materiality","The audit fee"], a:0,
  e:"Inherent risk is assessed before consideration of any related controls — it reflects the nature of the item/assertion itself."},
 {c:"Control risk", q:"Control risk is the risk that a material misstatement:",
  o:["Will be prevented by controls","Will not be prevented, or detected and corrected on a timely basis, by the entity’s internal control","Is detected by the auditor","Is immaterial"], a:1,
  e:"Control risk is the risk that the entity’s internal control fails to prevent, or detect and correct, a material misstatement on a timely basis."},
 {c:"Detection risk", q:"Detection risk is the risk that the auditor’s procedures will:",
  o:["Detect all misstatements","Not detect a misstatement that exists and could be material","Be too expensive","Be reviewed by the partner"], a:1,
  e:"Detection risk is the risk that the procedures performed will not detect an existing material misstatement; the auditor manages it through nature, timing and extent of work."},
 {c:"SA 315", q:"Identifying and assessing the risks of material misstatement through understanding the entity is dealt with by:",
  o:["SA 200","SA 315","SA 330","SA 500"], a:1,
  e:"SA 315 ‘Identifying and Assessing the Risks of Material Misstatement through Understanding the Entity and its Environment’."},
 {c:"Risk procedures", q:"Which of the following is a risk-assessment procedure under SA 315?",
  o:["External confirmation","Inquiries of management, analytical procedures, and observation & inspection","Recalculation","Issuing the audit report"], a:1,
  e:"Risk-assessment procedures are inquiries, analytical procedures, and observation & inspection — used to understand the entity and identify risks."},
 {c:"Understanding entity", q:"Understanding the entity and its environment includes everything EXCEPT:",
  o:["Relevant industry, regulatory and other external factors","The nature of the entity and its accounting policies","The entity’s objectives, strategies and related business risks","The personal investments of the auditor"], a:3,
  e:"The auditor understands external factors, the entity’s nature & policies, its objectives/strategies, and performance measurement — not the auditor’s own investments."},
 {c:"SA 330", q:"The auditor’s responses to the assessed risks of material misstatement are dealt with by:",
  o:["SA 315","SA 320","SA 330","SA 265"], a:2,
  e:"SA 330 ‘The Auditor’s Responses to Assessed Risks’ covers overall responses and further audit procedures (tests of controls and substantive procedures)."},
 {c:"IC components", q:"Which is NOT one of the components of internal control?",
  o:["The control environment","The entity’s risk assessment process","The information system and communication","The external auditor’s report"], a:3,
  e:"The five components are control environment, risk assessment process, information system & communication, control activities, and monitoring of controls."},
 {c:"Control environment", q:"The control environment includes:",
  o:["Bank reconciliations","The attitudes, awareness and actions of those charged with governance and management concerning internal control","The physical count of inventory","The audit programme"], a:1,
  e:"The control environment is the ‘tone at the top’ — governance/management’s attitudes, awareness and actions regarding internal control."},
 {c:"Control activities", q:"Which of the following is a control activity?",
  o:["Segregation of duties","The industry in which the entity operates","The auditor’s independence","The materiality level"], a:0,
  e:"Control activities include authorisation, performance reviews, information processing, physical controls and segregation of duties."},
 {c:"Segregation of duties", q:"Segregation of duties is designed to reduce the opportunity for a person to:",
  o:["Work efficiently","Both perpetrate and conceal errors or fraud in the normal course of duties","Take leave","Prepare reports"], a:1,
  e:"By separating custody, authorisation and recording, no single person can both commit and conceal an irregularity."},
 {c:"IC limitations", q:"Which of the following is an inherent limitation of internal control?",
  o:["Management override and human error","It guarantees prevention of all fraud","It eliminates the need for an audit","It provides absolute assurance"], a:0,
  e:"Limitations include human error, management override, collusion, cost-benefit considerations and unforeseen (non-routine) transactions."},
 {c:"IC objectives", q:"Internal control is designed to provide reasonable assurance about objectives relating to:",
  o:["Reliability of financial reporting, effectiveness & efficiency of operations, and compliance with laws","Maximising profit only","Winning the audit tender","Eliminating taxes"], a:0,
  e:"The objectives of internal control relate to reliable financial reporting, efficient & effective operations, and compliance with laws and regulations."},
 {c:"Significant risk", q:"A significant risk is one that:",
  o:["Is immaterial","Requires special audit consideration in the auditor’s judgement","Is always fully controllable","Relates only to cash"], a:1,
  e:"A significant risk requires special audit consideration — often arising from non-routine or judgemental matters, related-party transactions, or fraud risk."},
 {c:"Substantive alone", q:"The auditor may conclude that substantive procedures alone cannot give sufficient evidence when:",
  o:["Transactions are few and manual","The entity processes high-volume routine transactions in a highly automated way with little or no documentation","All controls are weak","Materiality is high"], a:1,
  e:"Where automated processing leaves little audit trail, the auditor must test controls — substantive procedures alone won’t suffice."},
 {c:"Tests of controls", q:"Tests of controls are performed to evaluate:",
  o:["The rupee accuracy of balances","The operating effectiveness of controls in preventing, or detecting and correcting, material misstatements","The audit fee","Going concern"], a:1,
  e:"Tests of controls assess whether controls operated effectively throughout the relevant period."},
 {c:"Substantive procedures", q:"Substantive procedures comprise:",
  o:["Tests of controls and inquiries","Tests of details and substantive analytical procedures","Risk-assessment procedures only","The engagement letter"], a:1,
  e:"Substantive procedures are tests of details (of classes of transactions, balances, disclosures) and substantive analytical procedures."},
 {c:"Evaluating IC", q:"Which of the following is a technique for recording/evaluating the internal control system?",
  o:["Narrative record, check list, internal control questionnaire and flow chart","Bank reconciliation","Trial balance","The audit report"], a:0,
  e:"Internal control is documented/evaluated using a narrative record, a check list, an internal control questionnaire (ICQ) or a flow chart."},
 {c:"ICQ", q:"An Internal Control Questionnaire (ICQ) is generally framed so that:",
  o:["A ‘Yes’ answer indicates a weakness","A ‘No’ answer usually indicates a potential weakness in control","Answers are not required","Only the auditor’s name is filled"], a:1,
  e:"ICQs are worded so that a ‘No’ reply normally signals a control weakness needing attention."},
 {c:"Walk-through", q:"A walk-through test involves:",
  o:["Tracing a few transactions through the accounting system from initiation to recording","Physically walking around the factory","Counting cash","Confirming receivables"], a:0,
  e:"A walk-through confirms the auditor’s understanding of the system by following a few transactions through the entire process."},
 {c:"SA 265", q:"Communicating deficiencies in internal control to those charged with governance and management is dealt with by:",
  o:["SA 240","SA 260","SA 265","SA 315"], a:2,
  e:"SA 265 ‘Communicating Deficiencies in Internal Control to Those Charged with Governance and Management’."},
 {c:"Significant deficiency", q:"A significant deficiency in internal control must be communicated in writing to:",
  o:["The general public","Those charged with governance","The tax authorities","The company’s competitors"], a:1,
  e:"Significant deficiencies are communicated in writing, on a timely basis, to those charged with governance (and relevant matters to management)."},
 {c:"IFC — Sec 143(3)(i)", q:"The requirement for the auditor to report on the adequacy & operating effectiveness of a company’s internal financial controls over financial reporting is in:",
  o:["Section 134(5)(e)","Section 143(3)(i)","Section 177(4)(vii)","Section 149(8)"], a:1,
  e:"Section 143(3)(i) requires the auditor to report on whether the company has adequate IFC over financial reporting and their operating effectiveness."},
 {c:"IFC — Sec 134(5)(e)", q:"The directors’ responsibility statement requirement (for listed companies) to lay down internal financial controls is found in:",
  o:["Section 134(5)(e)","Section 143(12)","Section 138","Section 141"], a:0,
  e:"Section 134(5)(e) requires the directors of a listed company to state that they laid down internal financial controls that are adequate and operating effectively."},
 {c:"IFC — Audit Committee", q:"Evaluation of internal financial controls and risk management systems is a function of the:",
  o:["Audit Committee — Section 177(4)(vii)","Nomination Committee","CSR Committee","Stakeholders Relationship Committee"], a:0,
  e:"Section 177(4)(vii) lists evaluation of internal financial controls and risk management systems among the Audit Committee’s functions."},
 {c:"General IT controls", q:"In an automated environment, controls supporting the effective functioning of application controls (access security, change management, backups) are:",
  o:["Application controls","General IT controls","Manual controls","Compensating controls"], a:1,
  e:"General IT controls (GITCs) — over access, change management, operations and backups — underpin the reliable operation of application controls."},
 {c:"Application controls", q:"Controls applied to the processing of individual transactions (input validation, sequence checks) are:",
  o:["General IT controls","Application controls","Entity-level controls","The control environment"], a:1,
  e:"Application controls operate at the transaction level — e.g., validation checks, sequence checks, and automated calculations within an application."},
 {c:"IT risks", q:"Which of the following is a risk specific to an IT (automated) environment?",
  o:["Unauthorised access to data and programs","Slower processing speed","Always-better segregation of duties","No risk at all"], a:0,
  e:"IT risks include unauthorised access/changes, systems processing data inaccurately, reliance on malfunctioning systems, and loss of data."},
 {c:"Relying on controls", q:"If the auditor intends to rely on the operating effectiveness of controls, the auditor must:",
  o:["Assume the controls work","Perform tests of those controls","Skip substantive procedures","Simply ask the client to confirm"], a:1,
  e:"Reliance on controls requires testing their operating effectiveness; the auditor cannot merely assume controls function."},
];

let order = DECK.map((_,i)=>i);
let pos = 0;
const answered = new Array(DECK.length).fill(null); // stores chosen index (per deck index)
const stage = document.getElementById('stage');
const navwrap = document.getElementById('navwrap');
const elProg = document.getElementById('prog');
const elCount = document.getElementById('count');
const elScore = document.getElementById('score');
const btnPrev = document.getElementById('prev');
const btnNext = document.getElementById('next');
const btnReveal = document.getElementById('reveal');
const LAB=['A','B','C','D'];

function scored(){return answered.filter((v,i)=>v!==null && v==='reveal'?false:(v!==null && v===DECK[i].a)).length;}
function correctCount(){let n=0;answered.forEach((v,i)=>{if(typeof v==='number' && v===DECK[i].a)n++});return n;}
function attempted(){return answered.filter(v=>typeof v==='number').length;}

function render(anim){
  if(pos>=order.length){return finish();}
  const di = order[pos];
  const card = DECK[di];
  const chosen = answered[di]; // number | 'reveal' | null
  const locked = chosen!==null;
  elProg.style.width = ((pos)/order.length*100)+'%';
  elCount.textContent = (pos+1)+' / '+order.length;
  elScore.textContent = '✓ '+correctCount();

  const opts = card.o.map((txt,i)=>{
    let cls='opt';
    if(locked){
      if(i===card.a) cls+=' correct';
      else if(typeof chosen==='number' && i===chosen) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" data-i="${i}" ${locked?'disabled':''}>
        <span class="lab">${LAB[i]}</span><span>${txt}</span></button>`;
  }).join('');

  let expCls = locked?'exp show':'exp';
  let verdict='';
  if(locked){
    if(chosen==='reveal') verdict=`<div class="verdict ok">Answer</div>`;
    else if(chosen===card.a) verdict=`<div class="verdict ok">✓ Correct</div>`;
    else verdict=`<div class="verdict no">✗ Not quite</div>`;
  }
  const expHtml = `<div class="${expCls}">${verdict}<p><span class="ans">Answer: ${LAB[card.a]}.</span> ${card.e}</p></div>`;

  stage.innerHTML = `<div class="card${anim?'':''}" id="card">
      <div class="cbody">
        <span class="pill">${card.c}</span><span class="qno">Q ${pos+1}</span>
        <div class="q">${card.q}</div>
        <div class="opts">${opts}</div>
        ${expHtml}
      </div></div>`;

  stage.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',()=>choose(parseInt(b.dataset.i,10)));
  });
  btnPrev.disabled = pos===0;
  btnNext.disabled = !locked;
  btnNext.textContent = (pos===order.length-1)?'Finish':'Next ›';
  btnReveal.style.visibility = locked?'hidden':'visible';
}

function choose(i){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]=i;
  render();
}
function reveal(){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]='reveal';
  render();
}
function go(d,dir){
  const card=document.getElementById('card');
  if(card && dir){ card.classList.add(dir==='next'?'swipe-l':'swipe-r'); }
  setTimeout(()=>{ pos=Math.max(0,Math.min(order.length,pos+d)); render(true); window.scrollTo({top:0,behavior:'smooth'}); }, dir?170:0);
}
function finish(){
  elProg.style.width='100%'; elCount.textContent=order.length+' / '+order.length;
  const att=attempted(), cor=correctCount();
  const pct = att? Math.round(cor/att*100):0;
  elScore.textContent='✓ '+cor;
  navwrap.classList.add('hidden');
  stage.innerHTML = `<div class="done">
    <div class="ring" style="--deg:${pct*3.6}deg"><div class="inner"><div><div class="big">${pct}<small>%</small></div></div></div></div>
    <h2>Deck complete</h2>
    <p>${cor} correct out of ${att} attempted · ${DECK.length} cards</p>
    <div class="row">
      <button class="btn next" id="again">Restart</button>
      <button class="btn reveal" id="shuf2" style="width:auto">Shuffle &amp; retry</button>
    </div>
  </div>`;
  document.getElementById('again').onclick=()=>{restart(false);};
  document.getElementById('shuf2').onclick=()=>{restart(true);};
}
function restart(shuf){
  for(let i=0;i<answered.length;i++) answered[i]=null;
  order = DECK.map((_,i)=>i);
  if(shuf){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} }
  pos=0; navwrap.classList.remove('hidden'); render(true); window.scrollTo({top:0});
}

btnPrev.onclick=()=>go(-1,'prev');
btnNext.onclick=()=>go(1,'next');
btnReveal.onclick=reveal;
document.getElementById('shuffle').onclick=()=>restart(true);
document.getElementById('restart').onclick=()=>restart(false);

// swipe
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0 && !btnNext.disabled) go(1,'next');
    else if(dx>0 && pos>0) go(-1,'prev');
  }
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && !btnNext.disabled) go(1,'next');
  if(e.key==='ArrowLeft' && pos>0) go(-1,'prev');
  if(['1','2','3','4'].includes(e.key)) choose(parseInt(e.key,10)-1);
  if(e.key.toLowerCase()==='r') reveal();
});

render(true);
</script>
</body>
</html>
