<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<title>CA Inter · Audit — Chapter 2 Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1EA; --card:#FFFFFF; --ink:#222A35; --muted:#6A7180;
    --navy:#1F3864; --navy2:#284a82; --accent:#2E75B6; --gold:#BF8F00;
    --green:#2F7D32; --green-bg:#E7F2E3; --red:#B23A2E; --red-bg:#FBE9E6;
    --soft:#EBF0F8; --line:#E4DFD4; --shadow:0 10px 30px rgba(31,56,100,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #fbfaf6 0%, rgba(251,250,246,0) 60%),
      repeating-linear-gradient(135deg, rgba(31,56,100,.020) 0 2px, transparent 2px 22px),
      var(--paper);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{width:100%;max-width:520px;padding:14px 16px 28px;display:flex;flex-direction:column;min-height:100dvh}

  /* Header */
  header{padding:6px 2px 12px}
  .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .ttl{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);font-size:25px;line-height:1.1;margin:3px 0 0;letter-spacing:-.01em}
  .ttl b{color:var(--gold);font-weight:600}
  .meta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .bar{flex:1;height:8px;border-radius:99px;background:#e6e2d8;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--navy));transition:width .35s ease}
  .count{font-weight:800;color:var(--navy);font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .score{font-weight:800;color:var(--green);font-size:13px;white-space:nowrap}

  /* Card */
  .stage{flex:1;display:flex;align-items:flex-start;padding-top:6px}
  .card{
    width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    border:1px solid #efece4;overflow:hidden;position:relative;animation:pop .32s cubic-bezier(.2,.7,.2,1)
  }
  .card:before{content:"";position:absolute;inset:0 0 auto;height:5px;background:linear-gradient(90deg,var(--navy),var(--accent) 60%,var(--gold))}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .card.swipe-l{animation:outL .22s ease forwards}
  .card.swipe-r{animation:outR .22s ease forwards}
  @keyframes outL{to{opacity:0;transform:translateX(-26px)}}
  @keyframes outR{to{opacity:0;transform:translateX(26px)}}
  .cbody{padding:18px 18px 20px}
  .pill{display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;
    color:#7a5c00;background:#FBF1D2;border:1px solid #efdfa6;padding:5px 10px;border-radius:99px}
  .qno{float:right;font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  .q{font-family:'Fraunces',serif;font-weight:500;font-size:19px;line-height:1.42;color:var(--navy);margin:14px 0 16px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fbfaf7;border:1.5px solid #e7e2d8;border-radius:13px;padding:12px 13px;font:inherit;color:var(--ink);
    font-size:14.5px;line-height:1.34;transition:border-color .15s,background .15s,transform .08s}
  .opt:active{transform:scale(.992)}
  .opt .lab{flex:none;width:24px;height:24px;border-radius:7px;background:var(--soft);color:var(--navy);
    font-weight:800;font-size:13px;display:grid;place-items:center;margin-top:-1px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .lab{background:var(--green);color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .lab{background:var(--red);color:#fff}
  .opt.dim{opacity:.62}
  .opt[disabled]{cursor:default}

  .exp{margin-top:15px;border-radius:13px;background:linear-gradient(180deg,#f6f9ff,#eef3fb);
    border:1px solid #d7e3f5;border-left:5px solid var(--accent);padding:13px 14px;
    max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease,margin .3s ease}
  .exp.show{max-height:420px;opacity:1}
  .exp .verdict{font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:5px}
  .exp .verdict.ok{color:var(--green)} .exp .verdict.no{color:var(--red)}
  .exp p{margin:0;font-size:14px;line-height:1.5;color:#33404f}
  .exp .ans{color:var(--navy);font-weight:700}

  /* Controls */
  .controls{margin-top:16px;display:flex;align-items:center;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px 12px;font:inherit;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .08s,filter .15s,opacity .15s}
  .btn:active{transform:translateY(1px)}
  .btn.prev{flex:none;width:54px;background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn.next{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(31,56,100,.25)}
  .btn.next:disabled{opacity:.45;box-shadow:none}
  .btn.reveal{background:#fff;border:1.5px solid var(--gold);color:#7a5c00;flex:none;width:auto;padding:14px 16px}
  .tools{margin-top:11px;display:flex;justify-content:center;gap:18px}
  .tool{background:none;border:none;font:inherit;font-weight:700;font-size:12.5px;color:var(--muted);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
  .tool:active{color:var(--navy)}
  .tool svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  .hint{text-align:center;color:#9a9384;font-size:11.5px;margin-top:14px;letter-spacing:.02em}

  /* Done screen */
  .done{width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid #efece4;
    padding:30px 22px;text-align:center;animation:pop .35s ease}
  .done .big{font-family:'Fraunces',serif;font-size:54px;font-weight:600;color:var(--navy);line-height:1}
  .done .big small{font-size:24px;color:var(--muted)}
  .done h2{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);margin:6px 0 2px;font-size:23px}
  .done p{color:var(--muted);font-size:14px;margin:4px 0 18px}
  .done .row{display:flex;gap:10px}
  .ring{width:118px;height:118px;margin:4px auto 8px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--gold) var(--deg,0deg), #ece7da 0deg)}
  .ring .inner{width:96px;height:96px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:inset 0 0 0 1px #efece4}
  .hidden{display:none!important}

  .hbar{ display:flex; align-items:center; gap:10px; }
  .htext{ flex:1; min-width:0; }
  .avatar{ width:42px; height:42px; border-radius:50%; flex:0 0 auto; object-fit:cover; border:2px solid #BF8F00; box-shadow:0 2px 6px rgba(0,0,0,.28); }
</style>

<script>
const DECK = [
 {c:"Planning standard", q:"Planning an audit involves establishing the overall audit strategy and developing an audit plan. The Standard that deals with this is:",
  o:["SA 200","SA 300","SA 315","SA 330"], a:1,
  e:"SA 300 ‘Planning an Audit of Financial Statements’ governs the overall audit strategy and the audit plan."},
 {c:"Benefits of planning", q:"Which of the following is NOT a benefit of adequate audit planning?",
  o:["Devoting appropriate attention to important areas","Identifying and resolving potential problems on a timely basis","Guaranteeing the detection of all frauds and errors","Selecting team members and assigning work appropriately"], a:2,
  e:"Planning improves effectiveness but cannot guarantee detection of all fraud/error — an audit gives reasonable, not absolute, assurance."},
 {c:"Nature of planning", q:"Audit planning is best described as:",
  o:["A discrete phase performed only at the start","A continual and iterative process throughout the audit","A step performed only after fieldwork ends","The sole responsibility of the audit assistant"], a:1,
  e:"Planning is not a discrete phase — it is continual and iterative, and may be revised as the audit progresses."},
 {c:"Strategy vs plan", q:"The overall audit strategy:",
  o:["Is more detailed than the audit plan","Sets the scope, timing and direction of the audit and guides the audit plan","Lists the specific procedures for each financial-statement item","Is prepared only for listed companies"], a:1,
  e:"The strategy sets the scope, timing and direction; the audit plan is the more detailed document (nature, timing and extent of procedures)."},
 {c:"Content of the plan", q:"The audit plan includes a description of:",
  o:["The firm’s quality-control policies","The planned nature, timing and extent of risk-assessment and further audit procedures","The engagement letter","The management representation letter"], a:1,
  e:"The audit plan describes planned risk-assessment procedures, further audit procedures at the assertion level, and other planned procedures."},
 {c:"Preliminary activities", q:"Which is a preliminary engagement activity performed at the beginning of the current audit?",
  o:["Issuing the audit report","Procedures on client continuance, ethical requirements (incl. independence) and the terms of engagement","Verifying closing inventory","Obtaining written representations"], a:1,
  e:"Preliminary engagement activities are client continuance, compliance with ethics/independence, and understanding the terms of engagement (SA 210)."},
 {c:"Establishing strategy", q:"In establishing the overall audit strategy, which matter would the auditor consider?",
  o:["The characteristics of the engagement that define its scope","The colour scheme of the audit report","The personal preferences of the client’s staff","The auditor’s holiday schedule"], a:0,
  e:"The strategy considers engagement characteristics (scope), reporting objectives & timing, significant factors, preliminary activities, and the nature/timing/extent of resources."},
 {c:"Resources & team", q:"Determining the appropriate engagement team and assigning work to its members is part of:",
  o:["The audit report","Establishing the overall audit strategy (ascertaining resources)","Written representations","The management letter"], a:1,
  e:"Ascertaining the nature, timing and extent of resources — including team selection and assignment — is part of establishing the strategy."},
 {c:"Direction & review", q:"The extent of direction, supervision of team members and review of their work mainly varies with:",
  o:["The auditor’s age","The assessed risks of material misstatement and the capabilities/competence of the team","The client’s turnover alone","The colour of the working papers"], a:1,
  e:"Direction, supervision and review depend on the entity’s size/complexity, the area audited, the assessed risks, and the team’s capabilities."},
 {c:"Documentation (SA 300)", q:"Under SA 300, the auditor documents the overall strategy, the audit plan and:",
  o:["Nothing else","Any significant changes made during the audit and the reasons for them","The client’s bank statements","The names of all shareholders"], a:1,
  e:"SA 300 requires documenting the strategy, the plan, and significant changes to them during the audit with the reasons."},
 {c:"Audit programme", q:"An audit programme is:",
  o:["A software package used for audits","A detailed written plan of the audit procedures (instructions) to be applied","The audit report","The engagement letter"], a:1,
  e:"An audit programme is a written set of instructions/procedures to be carried out by members of the audit team."},
 {c:"Programme — advantages", q:"Which is an advantage of an audit programme?",
  o:["It makes the audit rigid and unchangeable","It ensures uniform coverage, that no area is missed, and fixes responsibility for the work","It removes the need for audit evidence","It guarantees a clean opinion"], a:1,
  e:"Advantages include uniform coverage, division and fixing of responsibility, ease of supervision & review, and evidence of work performed."},
 {c:"Programme — drawbacks", q:"A possible disadvantage of a rigid audit programme is that:",
  o:["Work may become mechanical and staff may not exercise initiative","It improves efficiency","It fixes responsibility","It assists planning"], a:0,
  e:"Rigidity can make the work mechanical and let inefficient staff hide behind the programme — so it should be flexible and periodically reviewed."},
 {c:"Constructing programme", q:"While constructing an audit programme, the auditor should:",
  o:["Ignore the internal control system","Stay within the engagement’s scope & limitations and consider the entity’s internal control","Copy last year’s programme without any change","Avoid coordinating with the client"], a:1,
  e:"The programme must reflect the engagement’s scope and limitations and the entity’s controls, and be tailored — not blindly copied."},
 {c:"Flexibility", q:"An audit programme should be:",
  o:["Fixed permanently and never altered","Periodically reviewed and revised to suit changes in the client’s circumstances","Prepared by the client","Kept secret from the engagement team"], a:1,
  e:"The programme should be reviewed and revised as the client’s business and circumstances change."},
 {c:"Changes during audit", q:"If, during the audit, the auditor obtains information that differs significantly from that used in planning, the auditor should:",
  o:["Ignore it","Modify the overall strategy and the audit plan as necessary","Issue the report immediately","Resign from the engagement"], a:1,
  e:"Planning is iterative; the strategy and plan are revised whenever significant new information arises."},
 {c:"Knowledge of business", q:"Obtaining knowledge of the client’s business helps the auditor to:",
  o:["Prepare the client’s accounts","Identify areas needing special consideration, assess risks and plan effectively","Guarantee that no fraud exists","Replace the internal auditor"], a:1,
  e:"Understanding the business helps the auditor spot risk areas and design appropriate procedures during planning."},
 {c:"Materiality (SA 320)", q:"The auditor determines materiality:",
  o:["Only at the end of the audit","When planning the audit, revising it as the audit progresses if needed","Never","Only for listed companies"], a:1,
  e:"Under SA 320, materiality is set during planning and revised if new information or changed circumstances warrant it."},
 {c:"Performance materiality", q:"Performance materiality is set:",
  o:["Higher than overall materiality","At an amount below overall materiality to reduce the risk that aggregate uncorrected & undetected misstatements exceed materiality","Equal to the audit fee","By the client"], a:1,
  e:"Performance materiality is kept below overall materiality to allow for the aggregation of individually immaterial misstatements."},
 {c:"Interim work", q:"Performing some audit procedures before the period-end (e.g., preliminary analytical review, certain control tests) is called:",
  o:["Final audit","Interim audit work","Surprise check","Continuous audit"], a:1,
  e:"Interim work is performed before the year-end to ease the final audit and surface issues early."},
 {c:"Continuous audit", q:"A continuous audit is one where:",
  o:["The audit is done once a year after the accounts are closed","The auditor’s staff attend the client at regular intervals during the period to check transactions as they occur","The audit never ends","The client audits itself"], a:1,
  e:"In a continuous audit the auditor visits at regular intervals through the year — suited to large entities with voluminous transactions."},
 {c:"Surprise checks", q:"Surprise checks are mainly intended to:",
  o:["Replace the audit programme","Test whether internal control is operating effectively and act as a moral check on staff","Reduce the audit fee","Prepare the financial statements"], a:1,
  e:"Surprise checks test the real operation of internal controls and deter manipulation/fraud by acting as a moral check."},
 {c:"Test checking", q:"Test checking refers to:",
  o:["Checking 100% of transactions","Examining a representative sample of transactions to draw a conclusion about the whole","Ignoring high-value items","Checking only the trial balance"], a:1,
  e:"Test checking examines selected representative items to form a conclusion about the population, relying on sampling and internal control."},
 {c:"Senior involvement", q:"SA 300 requires the engagement partner and key team members to be involved in planning because:",
  o:["It reduces the audit fee","Their experience and insight enhance the effectiveness and efficiency of planning","The law says only partners may do all the work","Assistants cannot be trusted"], a:1,
  e:"Involving the engagement partner and key members brings their experience and insight to bear, improving the planning process."},
 {c:"Recurring audits", q:"For a recurring (continuing) audit, preliminary engagement activities help the auditor to:",
  o:["Skip the engagement letter forever","Decide on client continuance and confirm no issues affecting independence have arisen","Avoid planning altogether","Prepare the books of account"], a:1,
  e:"Even for continuing audits, the auditor reconsiders client continuance and ethics/independence before proceeding."},
 {c:"Strategy ↔ plan", q:"Which statement about the relationship between the strategy and the plan is correct?",
  o:["They are unrelated documents","They are inter-related — a change in one may lead to a change in the other","The plan is prepared before the strategy","Only the plan needs to be documented"], a:1,
  e:"The overall strategy and the detailed plan are closely inter-related; changes in one affect the other, and both are documented."},
 {c:"Programme as evidence", q:"A completed and initialled audit programme serves as:",
  o:["The financial statements","Evidence of the work performed and a means of fixing responsibility","The management representation","The engagement letter"], a:1,
  e:"When completed and initialled, the programme evidences the procedures performed and identifies who performed them."},
 {c:"Tailoring", q:"An audit programme designed for one client:",
  o:["Can be used for every client without any change","Should be tailored to the specific client, its business and its internal control","Is prohibited by law","Must be approved by the client’s board"], a:1,
  e:"Programmes must be tailored; a standard programme applied blindly may miss client-specific risks."},
 {c:"Planning & risk", q:"Adequate planning benefits the audit by helping to:",
  o:["Eliminate audit risk entirely","Reduce audit risk to an acceptably low level by directing effort to higher-risk areas","Avoid obtaining audit evidence","Shorten the audit report"], a:1,
  e:"Planning channels effort toward higher-risk areas, helping reduce audit risk to an acceptably low level — it cannot eliminate it."},
 {c:"Sequence", q:"Which generally comes first in the planning process?",
  o:["Developing the detailed audit plan","Performing preliminary engagement activities and establishing the overall audit strategy","Issuing the audit opinion","Verifying assets"], a:1,
  e:"The auditor first performs preliminary engagement activities and sets the overall strategy, then develops the detailed audit plan."},
];

let order = DECK.map((_,i)=>i);
let pos = 0;
const answered = new Array(DECK.length).fill(null); // stores chosen index (per deck index)
const stage = document.getElementById('stage');
const navwrap = document.getElementById('navwrap');
const elProg = document.getElementById('prog');
const elCount = document.getElementById('count');
const elScore = document.getElementById('score');
const btnPrev = document.getElementById('prev');
const btnNext = document.getElementById('next');
const btnReveal = document.getElementById('reveal');
const LAB=['A','B','C','D'];

function scored(){return answered.filter((v,i)=>v!==null && v==='reveal'?false:(v!==null && v===DECK[i].a)).length;}
function correctCount(){let n=0;answered.forEach((v,i)=>{if(typeof v==='number' && v===DECK[i].a)n++});return n;}
function attempted(){return answered.filter(v=>typeof v==='number').length;}

function render(anim){
  if(pos>=order.length){return finish();}
  const di = order[pos];
  const card = DECK[di];
  const chosen = answered[di]; // number | 'reveal' | null
  const locked = chosen!==null;
  elProg.style.width = ((pos)/order.length*100)+'%';
  elCount.textContent = (pos+1)+' / '+order.length;
  elScore.textContent = '✓ '+correctCount();

  const opts = card.o.map((txt,i)=>{
    let cls='opt';
    if(locked){
      if(i===card.a) cls+=' correct';
      else if(typeof chosen==='number' && i===chosen) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" data-i="${i}" ${locked?'disabled':''}>
        <span class="lab">${LAB[i]}</span><span>${txt}</span></button>`;
  }).join('');

  let expCls = locked?'exp show':'exp';
  let verdict='';
  if(locked){
    if(chosen==='reveal') verdict=`<div class="verdict ok">Answer</div>`;
    else if(chosen===card.a) verdict=`<div class="verdict ok">✓ Correct</div>`;
    else verdict=`<div class="verdict no">✗ Not quite</div>`;
  }
  const expHtml = `<div class="${expCls}">${verdict}<p><span class="ans">Answer: ${LAB[card.a]}.</span> ${card.e}</p></div>`;

  stage.innerHTML = `<div class="card${anim?'':''}" id="card">
      <div class="cbody">
        <span class="pill">${card.c}</span><span class="qno">Q ${pos+1}</span>
        <div class="q">${card.q}</div>
        <div class="opts">${opts}</div>
        ${expHtml}
      </div></div>`;

  stage.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',()=>choose(parseInt(b.dataset.i,10)));
  });
  btnPrev.disabled = pos===0;
  btnNext.disabled = !locked;
  btnNext.textContent = (pos===order.length-1)?'Finish':'Next ›';
  btnReveal.style.visibility = locked?'hidden':'visible';
}

function choose(i){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]=i;
  render();
}
function reveal(){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]='reveal';
  render();
}
function go(d,dir){
  const card=document.getElementById('card');
  if(card && dir){ card.classList.add(dir==='next'?'swipe-l':'swipe-r'); }
  setTimeout(()=>{ pos=Math.max(0,Math.min(order.length,pos+d)); render(true); window.scrollTo({top:0,behavior:'smooth'}); }, dir?170:0);
}
function finish(){
  elProg.style.width='100%'; elCount.textContent=order.length+' / '+order.length;
  const att=attempted(), cor=correctCount();
  const pct = att? Math.round(cor/att*100):0;
  elScore.textContent='✓ '+cor;
  navwrap.classList.add('hidden');
  stage.innerHTML = `<div class="done">
    <div class="ring" style="--deg:${pct*3.6}deg"><div class="inner"><div><div class="big">${pct}<small>%</small></div></div></div></div>
    <h2>Deck complete</h2>
    <p>${cor} correct out of ${att} attempted · ${DECK.length} cards</p>
    <div class="row">
      <button class="btn next" id="again">Restart</button>
      <button class="btn reveal" id="shuf2" style="width:auto">Shuffle &amp; retry</button>
    </div>
  </div>`;
  document.getElementById('again').onclick=()=>{restart(false);};
  document.getElementById('shuf2').onclick=()=>{restart(true);};
}
function restart(shuf){
  for(let i=0;i<answered.length;i++) answered[i]=null;
  order = DECK.map((_,i)=>i);
  if(shuf){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} }
  pos=0; navwrap.classList.remove('hidden'); render(true); window.scrollTo({top:0});
}

btnPrev.onclick=()=>go(-1,'prev');
btnNext.onclick=()=>go(1,'next');
btnReveal.onclick=reveal;
document.getElementById('shuffle').onclick=()=>restart(true);
document.getElementById('restart').onclick=()=>restart(false);

// swipe
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0 && !btnNext.disabled) go(1,'next');
    else if(dx>0 && pos>0) go(-1,'prev');
  }
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && !btnNext.disabled) go(1,'next');
  if(e.key==='ArrowLeft' && pos>0) go(-1,'prev');
  if(['1','2','3','4'].includes(e.key)) choose(parseInt(e.key,10)-1);
  if(e.key.toLowerCase()==='r') reveal();
});

render(true);
</script>
</body>
</html>
