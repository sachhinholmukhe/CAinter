<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<title>CA Inter · Audit — Chapter 4 Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1EA; --card:#FFFFFF; --ink:#222A35; --muted:#6A7180;
    --navy:#1F3864; --navy2:#284a82; --accent:#2E75B6; --gold:#BF8F00;
    --green:#2F7D32; --green-bg:#E7F2E3; --red:#B23A2E; --red-bg:#FBE9E6;
    --soft:#EBF0F8; --line:#E4DFD4; --shadow:0 10px 30px rgba(31,56,100,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Mulish',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #fbfaf6 0%, rgba(251,250,246,0) 60%),
      repeating-linear-gradient(135deg, rgba(31,56,100,.020) 0 2px, transparent 2px 22px),
      var(--paper);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{width:100%;max-width:520px;padding:14px 16px 28px;display:flex;flex-direction:column;min-height:100dvh}

  /* Header */
  header{padding:6px 2px 12px}
  .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .ttl{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);font-size:25px;line-height:1.1;margin:3px 0 0;letter-spacing:-.01em}
  .ttl b{color:var(--gold);font-weight:600}
  .meta{display:flex;align-items:center;gap:10px;margin-top:12px}
  .bar{flex:1;height:8px;border-radius:99px;background:#e6e2d8;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--navy));transition:width .35s ease}
  .count{font-weight:800;color:var(--navy);font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .score{font-weight:800;color:var(--green);font-size:13px;white-space:nowrap}

  /* Card */
  .stage{flex:1;display:flex;align-items:flex-start;padding-top:6px}
  .card{
    width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    border:1px solid #efece4;overflow:hidden;position:relative;animation:pop .32s cubic-bezier(.2,.7,.2,1)
  }
  .card:before{content:"";position:absolute;inset:0 0 auto;height:5px;background:linear-gradient(90deg,var(--navy),var(--accent) 60%,var(--gold))}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .card.swipe-l{animation:outL .22s ease forwards}
  .card.swipe-r{animation:outR .22s ease forwards}
  @keyframes outL{to{opacity:0;transform:translateX(-26px)}}
  @keyframes outR{to{opacity:0;transform:translateX(26px)}}
  .cbody{padding:18px 18px 20px}
  .pill{display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;
    color:#7a5c00;background:#FBF1D2;border:1px solid #efdfa6;padding:5px 10px;border-radius:99px}
  .qno{float:right;font-size:12px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:3px}
  .q{font-family:'Fraunces',serif;font-weight:500;font-size:19px;line-height:1.42;color:var(--navy);margin:14px 0 16px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fbfaf7;border:1.5px solid #e7e2d8;border-radius:13px;padding:12px 13px;font:inherit;color:var(--ink);
    font-size:14.5px;line-height:1.34;transition:border-color .15s,background .15s,transform .08s}
  .opt:active{transform:scale(.992)}
  .opt .lab{flex:none;width:24px;height:24px;border-radius:7px;background:var(--soft);color:var(--navy);
    font-weight:800;font-size:13px;display:grid;place-items:center;margin-top:-1px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .lab{background:var(--green);color:#fff}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .lab{background:var(--red);color:#fff}
  .opt.dim{opacity:.62}
  .opt[disabled]{cursor:default}

  .exp{margin-top:15px;border-radius:13px;background:linear-gradient(180deg,#f6f9ff,#eef3fb);
    border:1px solid #d7e3f5;border-left:5px solid var(--accent);padding:13px 14px;
    max-height:0;opacity:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease,margin .3s ease}
  .exp.show{max-height:420px;opacity:1}
  .exp .verdict{font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:5px}
  .exp .verdict.ok{color:var(--green)} .exp .verdict.no{color:var(--red)}
  .exp p{margin:0;font-size:14px;line-height:1.5;color:#33404f}
  .exp .ans{color:var(--navy);font-weight:700}

  /* Controls */
  .controls{margin-top:16px;display:flex;align-items:center;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px 12px;font:inherit;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .08s,filter .15s,opacity .15s}
  .btn:active{transform:translateY(1px)}
  .btn.prev{flex:none;width:54px;background:#fff;border:1.5px solid var(--line);color:var(--navy)}
  .btn.next{background:var(--navy);color:#fff;box-shadow:0 6px 16px rgba(31,56,100,.25)}
  .btn.next:disabled{opacity:.45;box-shadow:none}
  .btn.reveal{background:#fff;border:1.5px solid var(--gold);color:#7a5c00;flex:none;width:auto;padding:14px 16px}
  .tools{margin-top:11px;display:flex;justify-content:center;gap:18px}
  .tool{background:none;border:none;font:inherit;font-weight:700;font-size:12.5px;color:var(--muted);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
  .tool:active{color:var(--navy)}
  .tool svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  .hint{text-align:center;color:#9a9384;font-size:11.5px;margin-top:14px;letter-spacing:.02em}

  /* Done screen */
  .done{width:100%;background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid #efece4;
    padding:30px 22px;text-align:center;animation:pop .35s ease}
  .done .big{font-family:'Fraunces',serif;font-size:54px;font-weight:600;color:var(--navy);line-height:1}
  .done .big small{font-size:24px;color:var(--muted)}
  .done h2{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);margin:6px 0 2px;font-size:23px}
  .done p{color:var(--muted);font-size:14px;margin:4px 0 18px}
  .done .row{display:flex;gap:10px}
  .ring{width:118px;height:118px;margin:4px auto 8px;border-radius:50%;display:grid;place-items:center;
    background:conic-gradient(var(--gold) var(--deg,0deg), #ece7da 0deg)}
  .ring .inner{width:96px;height:96px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:inset 0 0 0 1px #efece4}
  .hidden{display:none!important}

  .hbar{ display:flex; align-items:center; gap:10px; }
  .htext{ flex:1; min-width:0; }
  .avatar{ width:42px; height:42px; border-radius:50%; flex:0 0 auto; object-fit:cover; border:2px solid #BF8F00; box-shadow:0 2px 6px rgba(0,0,0,.28); }
</style>

const DECK = [
 {c:"Audit evidence — SA 500", q:"The Standard dealing with audit evidence — its sufficiency and appropriateness — is:",
  o:["SA 230","SA 500","SA 505","SA 530"], a:1,
  e:"SA 500 ‘Audit Evidence’ deals with the auditor’s responsibility to obtain sufficient appropriate audit evidence."},
 {c:"Sufficiency vs appropriateness", q:"In relation to audit evidence, ‘sufficiency’ is the measure of the ___ and ‘appropriateness’ the measure of the ___ of the evidence.",
  o:["quality; quantity","quantity; quality","cost; benefit","timing; extent"], a:1,
  e:"Sufficiency is the measure of the quantity of audit evidence; appropriateness is the measure of its quality (relevance and reliability)."},
 {c:"Appropriateness", q:"Appropriateness of audit evidence refers to its:",
  o:["Quantity","Relevance and reliability in supporting the conclusions","Cost","Speed of collection"], a:1,
  e:"Appropriateness is the quality of evidence — its relevance to, and reliability for, the assertion being tested."},
 {c:"Reliability of evidence", q:"Which source of audit evidence is generally the most reliable?",
  o:["Evidence generated internally with weak controls","Evidence obtained directly by the auditor (e.g., observation, recalculation)","Oral evidence from management","Photocopies provided by the client"], a:1,
  e:"Evidence is more reliable when obtained directly by the auditor, from independent external sources, in documentary form, and where related controls are effective."},
 {c:"Reliability — external", q:"Audit evidence obtained from an independent external source is generally:",
  o:["Less reliable than internal evidence","More reliable than evidence generated internally by the entity","Always conclusive","Irrelevant"], a:1,
  e:"External, independent evidence is generally more reliable than internally generated evidence (subject to the entity’s controls)."},
 {c:"Audit procedures", q:"Which of the following is an audit procedure for obtaining audit evidence?",
  o:["Inspection, observation, external confirmation, recalculation, re-performance, analytical procedures and inquiry","Only inquiry","Only inspection","Preparing the financial statements"], a:0,
  e:"SA 500 lists inspection, observation, external confirmation, recalculation, re-performance, analytical procedures and inquiry."},
 {c:"Inquiry alone", q:"Inquiry alone:",
  o:["Provides sufficient appropriate evidence on its own","Does not ordinarily provide sufficient appropriate evidence and must be corroborated","Is never used","Replaces all other procedures"], a:1,
  e:"Inquiry alone does not provide sufficient appropriate evidence of the absence of material misstatement or of operating effectiveness — it must be corroborated."},
 {c:"External confirmation — SA 505", q:"The Standard on External Confirmations is:",
  o:["SA 501","SA 505","SA 510","SA 550"], a:1,
  e:"SA 505 ‘External Confirmations’ deals with the auditor’s use of external confirmation procedures."},
 {c:"Positive confirmation", q:"A positive confirmation request asks the confirming party to respond:",
  o:["Only if it disagrees with the information","In all cases, indicating agreement or disagreement","Only to the client","Through the newspaper"], a:1,
  e:"A positive request seeks a reply in all cases; a negative request seeks a reply only when the party disagrees."},
 {c:"Negative confirmation", q:"Negative confirmation requests are appropriate when:",
  o:["The assessed RMM is high","RMM is low, controls are effective, a large number of small homogeneous balances exist, and a very low exception rate is expected","Items are large and individually significant","Controls are weak"], a:1,
  e:"Negative confirmations suit low-RMM, effective-control situations with many small homogeneous items and a low expected exception rate."},
 {c:"Specific items — SA 501", q:"Audit evidence for inventory, litigation & claims, and segment information is dealt with by:",

 {c:"Inventory attendance", q:"When inventory is material, SA 501 requires the auditor to:",

  e:"The auditor should attend the physical count, evaluate management’s instructions, observe procedures, inspect inventory and perform test counts."},
 {c:"Opening balances — SA 510", q:"Audit evidence regarding opening balances in an initial audit engagement is dealt with by:",

 {c:"Analytical procedures — SA 520", q:"Substantive analytical procedures are dealt with by:",

  e:"SA 520 ‘Analytical Procedures’ deals with substantive analytical procedures and those used in forming an overall conclusion."},
 {c:"Analytical procedures — meaning", q:"Analytical procedures involve evaluating financial information by:",
  o:["Counting cash","Studying plausible relationships among financial and non-financial data","Confirming receivables","Re-performing controls"], a:1,
  e:"Analytical procedures study plausible relationships among data and investigate identified fluctuations or inconsistencies."},
 {c:"Sampling — SA 530", q:"Audit sampling is dealt with by:",

 {c:"Audit sampling — meaning", q:"Audit sampling is the application of procedures to:",

 {c:"Sample selection", q:"Which is a method of selecting a sample?",

 {c:"Tolerable misstatement", q:"Tolerable misstatement is:",
  o:["The actual misstatement found","A monetary amount set by the auditor to obtain appropriate assurance that it is not exceeded by the actual misstatement in the population","The audit fee","The materiality for the financial statements as a whole only"], a:1,
  e:"Tolerable misstatement is the application of performance materiality to a particular sampling procedure."},
 {c:"Accounting estimates — SA 540", q:"Auditing accounting estimates, including fair value estimates, is dealt with by:",
  o:["SA 530","SA 540","SA 550","SA 560"], a:1,
  e:"SA 540 ‘Auditing Accounting Estimates and Related Disclosures’ addresses the audit of estimates and the related estimation uncertainty."},
 {c:"Related parties — SA 550", q:"Audit procedures and considerations relating to related-party relationships and transactions are in:",
  o:["SA 505","SA 540","SA 550","SA 560"], a:2,
  e:"SA 550 ‘Related Parties’ deals with identifying, assessing and responding to risks from related-party relationships and transactions."},
 {c:"Using an expert — SA 620", q:"Using the work of an auditor’s expert is dealt with by:",
  o:["SA 610","SA 620","SA 600","SA 299"], a:1,
  e:"SA 620 ‘Using the Work of an Auditor’s Expert’ governs reliance on an expert (e.g., a valuer or actuary) engaged to assist the auditor."},
 {c:"Internal auditors — SA 610", q:"Using the work of the internal auditors is dealt with by:",
  o:["SA 610","SA 620","SA 600","SA 700"], a:0,
  e:"SA 610 ‘Using the Work of Internal Auditors’ governs when and how the external auditor may use internal audit work."},
 {c:"Using another auditor — SA 600", q:"Where another auditor audits a component (e.g., a branch), the principal auditor refers to:",
  o:["SA 600","SA 610","SA 620","SA 510"], a:0,
  e:"SA 600 ‘Using the Work of Another Auditor’ deals with the principal auditor’s use of the work of a component/branch auditor."},
 {c:"Written representations — SA 580", q:"Written representations obtained from management are governed by:",
  o:["SA 560","SA 570","SA 580","SA 600"], a:2,
  e:"SA 580 ‘Written Representations’ deals with obtaining written representations from management and TCWG as audit evidence."},
 {c:"Nature of WR", q:"Written representations are:",
  o:["A substitute for other audit evidence","Necessary audit evidence but not, by themselves, sufficient appropriate evidence about the matters they concern","Conclusive proof","Not required at all"], a:1,
  e:"Written representations provide necessary evidence but are not sufficient on their own; the auditor still needs other corroborating evidence."},
 {c:"Conflicting evidence", q:"If audit evidence from one source is inconsistent with that from another, the auditor should:",
  o:["Ignore the inconsistency","Determine what modifications or additions to procedures are necessary to resolve the matter","Always accept management’s version","Issue a clean report regardless"], a:1,
  e:"Inconsistency/doubts about reliability require the auditor to investigate and modify or extend procedures to resolve the matter (SA 500)."},
 {c:"Relevance", q:"Relevance of audit evidence deals with:",
  o:["The amount of evidence","The logical connection with, or bearing upon, the purpose of the audit procedure and the assertion tested","Its cost","Who collected it"], a:1,
  e:"Relevance is the logical connection between the evidence and the assertion under consideration; a procedure relevant to one assertion may not be relevant to another."},
 {c:"Management’s expert", q:"When information used as audit evidence has been prepared using the work of a management’s expert, the auditor shall:",
  o:["Automatically accept it","Evaluate the competence, capabilities and objectivity of that expert and the appropriateness of the work","Reject it","Ask the management’s expert to sign the audit report"], a:1,
  e:"Under SA 500, the auditor evaluates the management’s expert’s competence, capability and objectivity, obtains an understanding of the work, and assesses its appropriateness as evidence."},
];

let order = DECK.map((_,i)=>i);
let pos = 0;
const answered = new Array(DECK.length).fill(null); // stores chosen index (per deck index)
const stage = document.getElementById('stage');
const navwrap = document.getElementById('navwrap');
const elProg = document.getElementById('prog');
const elCount = document.getElementById('count');
const elScore = document.getElementById('score');
const btnPrev = document.getElementById('prev');
const btnNext = document.getElementById('next');
const btnReveal = document.getElementById('reveal');
const LAB=['A','B','C','D'];

function scored(){return answered.filter((v,i)=>v!==null && v==='reveal'?false:(v!==null && v===DECK[i].a)).length;}
function correctCount(){let n=0;answered.forEach((v,i)=>{if(typeof v==='number' && v===DECK[i].a)n++});return n;}
function attempted(){return answered.filter(v=>typeof v==='number').length;}

function render(anim){
  if(pos>=order.length){return finish();}
  const di = order[pos];
  const card = DECK[di];
  const chosen = answered[di]; // number | 'reveal' | null
  const locked = chosen!==null;
  elProg.style.width = ((pos)/order.length*100)+'%';
  elCount.textContent = (pos+1)+' / '+order.length;
  elScore.textContent = '✓ '+correctCount();

  const opts = card.o.map((txt,i)=>{
    let cls='opt';
    if(locked){
      if(i===card.a) cls+=' correct';
      else if(typeof chosen==='number' && i===chosen) cls+=' wrong';
      else cls+=' dim';
    }
    return `<button class="${cls}" data-i="${i}" ${locked?'disabled':''}>
        <span class="lab">${LAB[i]}</span><span>${txt}</span></button>`;
  }).join('');

  let expCls = locked?'exp show':'exp';
  let verdict='';
  if(locked){
    if(chosen==='reveal') verdict=`<div class="verdict ok">Answer</div>`;
    else if(chosen===card.a) verdict=`<div class="verdict ok">✓ Correct</div>`;
    else verdict=`<div class="verdict no">✗ Not quite</div>`;
  }
  const expHtml = `<div class="${expCls}">${verdict}<p><span class="ans">Answer: ${LAB[card.a]}.</span> ${card.e}</p></div>`;

  stage.innerHTML = `<div class="card${anim?'':''}" id="card">
      <div class="cbody">
        <span class="pill">${card.c}</span><span class="qno">Q ${pos+1}</span>
        <div class="q">${card.q}</div>
        <div class="opts">${opts}</div>
        ${expHtml}
      </div></div>`;

  stage.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',()=>choose(parseInt(b.dataset.i,10)));
  });
  btnPrev.disabled = pos===0;
  btnNext.disabled = !locked;
  btnNext.textContent = (pos===order.length-1)?'Finish':'Next ›';
  btnReveal.style.visibility = locked?'hidden':'visible';
}

function choose(i){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]=i;
  render();
}
function reveal(){
  const di=order[pos];
  if(answered[di]!==null) return;
  answered[di]='reveal';
  render();
}
function go(d,dir){
  const card=document.getElementById('card');
  if(card && dir){ card.classList.add(dir==='next'?'swipe-l':'swipe-r'); }
  setTimeout(()=>{ pos=Math.max(0,Math.min(order.length,pos+d)); render(true); window.scrollTo({top:0,behavior:'smooth'}); }, dir?170:0);
}
function finish(){
  elProg.style.width='100%'; elCount.textContent=order.length+' / '+order.length;
  const att=attempted(), cor=correctCount();
  const pct = att? Math.round(cor/att*100):0;
  elScore.textContent='✓ '+cor;
  navwrap.classList.add('hidden');
  stage.innerHTML = `<div class="done">
    <div class="ring" style="--deg:${pct*3.6}deg"><div class="inner"><div><div class="big">${pct}<small>%</small></div></div></div></div>
    <h2>Deck complete</h2>
    <p>${cor} correct out of ${att} attempted · ${DECK.length} cards</p>
    <div class="row">
      <button class="btn next" id="again">Restart</button>
      <button class="btn reveal" id="shuf2" style="width:auto">Shuffle &amp; retry</button>
    </div>
  </div>`;
  document.getElementById('again').onclick=()=>{restart(false);};
  document.getElementById('shuf2').onclick=()=>{restart(true);};
}
function restart(shuf){
  for(let i=0;i<answered.length;i++) answered[i]=null;
  order = DECK.map((_,i)=>i);
  if(shuf){ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} }
  pos=0; navwrap.classList.remove('hidden'); render(true); window.scrollTo({top:0});
}

btnPrev.onclick=()=>go(-1,'prev');
btnNext.onclick=()=>go(1,'next');
btnReveal.onclick=reveal;
document.getElementById('shuffle').onclick=()=>restart(true);
document.getElementById('restart').onclick=()=>restart(false);

// swipe
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0 && !btnNext.disabled) go(1,'next');
    else if(dx>0 && pos>0) go(-1,'prev');
  }
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight' && !btnNext.disabled) go(1,'next');
  if(e.key==='ArrowLeft' && pos>0) go(-1,'prev');
  if(['1','2','3','4'].includes(e.key)) choose(parseInt(e.key,10)-1);
  if(e.key.toLowerCase()==='r') reveal();
});

render(true);
</script>
</body>
</html>
